<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gestión - SUNDDE</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/35Dbkm90/denuncias.png">
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/35Dbkm90/denuncias.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SUNDDE">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* === VARIABLES Y RESET === */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            --text-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
        }

        body {
            background-image: url('https://i.ibb.co/Z1phdF8M/fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* === CLASES BASE LIQUID GLASS === */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
        }

        /* === PANTALLA DE LOGIN === */
        #login-view {
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .app-logo {
            width: 160px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }

        input[type="email"], input[type="password"], textarea {
            width: 100%;
            padding: 12px 15px;
            background: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #000000;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        button.btn-primary {
            width: 100%;
            padding: 14px;
            background: #e0e0e0;
            border: 1px solid #b3b3b3;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button.btn-primary:hover {
            background: #cccccc;
            transform: translateY(-2px);
        }

        /* === PANTALLA DASHBOARD === */
        #dashboard-view {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-radius: 0 0 24px 24px;
            margin-bottom: 15px;
        }

        .header-logo {
            height: 50px;
        }

        .user-profile-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile {
            text-align: right;
            font-size: 0.9rem;
        }

        /* Botón Logout estilo icono circular */
        .btn-logout {
            background: transparent;
            border: 1px solid #000000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #ffcccc;
            border-color: #cc0000;
        }

        .btn-logout:hover .material-icons {
            color: #cc0000;
        }

        /* === BARRA DE FILTROS === */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 0 5%;
            flex-wrap: wrap;
        }

        .btn-filter {
            background: #ffffff;
            border: 1px solid #000000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-filter:hover, .btn-filter.active {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .cards-container {
            flex: 1;
            padding: 0 5% 30px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            align-content: start;
        }

        .denuncia-card {
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
            border: 1px solid #cccccc;
        }

        .denuncia-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.9);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 10px;
            border: 1px solid #000;
        }

        /* === MODAL FLOTANTE === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #ffffff;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid #000;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }

        .decision-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #dddddd;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-group button {
            flex: 1;
        }

        #explanation-box {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.4s ease;
        }

        .loader {
            border: 4px solid #cccccc;
            border-radius: 50%;
            border-top: 4px solid #000000;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cccccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-view" class="glass-panel">
        <img src="https://i.ibb.co/1f607SYR/logosundde.png" alt="Logo" class="app-logo">
        <h2>Iniciar Sesión</h2>
        <p style="font-size: 0.85rem; margin-bottom: 25px;">Portal de Sujetos de Aplicación</p>
        
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="usuario@empresa.com">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-primary" id="btn-login" onclick="ingresar()">Acceder al Sistema</button>
        <div id="login-loader" style="display:none; margin-top:15px;"><div class="loader"></div></div>
        <p id="login-error" style="color:#cc0000; font-size:0.85rem; font-weight: bold; margin-top:10px; display:none;"></p>
    </div>

    <div id="dashboard-view">
        <header class="glass-panel dashboard-header">
            <img src="https://i.ibb.co/1f607SYR/logosundde.png" alt="Logo Pequeño" class="header-logo">
            <div class="user-profile-container">
                <div class="user-profile">
                    <strong id="perfil-nombre">Nombre Apellido</strong><br>
                    <span id="perfil-empresa" style="font-weight: 600;">Empresa</span>
                </div>
                <button class="btn-logout" onclick="cerrarSesion()" title="Cerrar Sesión">
                    <span class="material-icons">logout</span>
                </button>
            </div>
        </header>

        <div class="filter-bar">
            <button class="btn-filter active" id="btn-pendientes" onclick="filtrarVista('Pendiente')">Denuncias Recibidas</button>
            <button class="btn-filter" id="btn-procede" onclick="filtrarVista('Procede')">Procede</button>
            <button class="btn-filter" id="btn-noprocede" onclick="filtrarVista('No Procede')">No Procede</button>
        </div>

        <div id="dashboard-loader" style="display:none; text-align:center; padding: 40px;"><div class="loader"></div><p style="margin-top:10px; font-weight:bold;">Cargando base de datos...</p></div>
        
        <main class="cards-container" id="cards-container">
            </main>
    </div>

    <div id="details-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="cerrarModal()">&times;</button>
            <h2 id="modal-titulo" style="margin-bottom: 15px;">Detalles de la Denuncia</h2>
            
            <div style="font-size: 0.95rem; line-height: 1.6;">
                <p><strong>Denunciante:</strong> <span id="modal-denunciante"></span></p>
                <p><strong>Cédula:</strong> <span id="modal-cedula"></span></p>
                <p><strong>Teléfono:</strong> <span id="modal-telefono"></span></p>
                <p><strong>Empresa Implicada:</strong> <span id="modal-empresaimplicada"></span></p>
                <p><strong>Producto:</strong> <span id="modal-producto"></span></p>
                <p><strong>Motivo de la denuncia:</strong> <span id="modal-motivo"></span></p>
            </div>

            <div class="decision-box" id="decision-box">
                <p style="font-weight: 700;">¿Cumple con las garantías?</p>
                <div class="btn-group">
                    <button class="btn-primary" onclick="mostrarExplicacion('Procede')">Procede</button>
                    <button class="btn-primary" onclick="mostrarExplicacion('No Procede')">No Procede</button>
                </div>
            </div>

            <div id="explanation-box">
                <label id="explanation-label" style="display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 700;"></label>
                <textarea id="respuesta-texto" rows="4" placeholder="Escriba detalladamente su respuesta aquí..."></textarea>
                <button class="btn-primary" id="btn-enviar-respuesta" style="margin-top: 15px; width: 100%; background: #000; color: #fff;" onclick="enviarRespuesta()">Confirmar y Enviar a Base de Datos</button>
            </div>
            
            <p id="mensaje-exito" style="color: #006600; font-weight: bold; margin-top: 15px; display: none; text-align: center;"></p>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLPFaUEDcH3EOMGykhCkk7UeufZjFSgJiNQRMwsi1FSKJA9eWVEbGB40cxExd9Z6U/exec";
        
        let usuarioActual = {};
        let denunciasDescargadas = [];
        let denunciaSeleccionada = null;
        let prefijoDecision = "";

        // === AUTO-LOGIN AL CARGAR PÁGINA ===
        window.onload = () => {
            const sesionGuardada = localStorage.getItem('sesionSundde');
            if (sesionGuardada) {
                usuarioActual = JSON.parse(sesionGuardada);
                prepararDashboard();
            }
        };

        function prepararDashboard() {
            // Muestra Nombre si existe, si no muestra el email por seguridad
            document.getElementById('perfil-nombre').innerText = usuarioActual.nombre || usuarioActual.email;
            document.getElementById('perfil-empresa').innerText = usuarioActual.empresa;
            
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'flex';
            
            cargarDenuncias();
        }

        // === 1. LÓGICA DE LOGIN ===
        async function ingresar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');
            const loader = document.getElementById('login-loader');

            if (!email || !password) {
                errorMsg.innerText = "Por favor ingrese correo y contraseña.";
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "login", email: email, password: password })
                });
                
                const result = await response.json();

                if (result.success) {
                    usuarioActual = result;
                    // Guardamos la sesión en el navegador
                    localStorage.setItem('sesionSundde', JSON.stringify(usuarioActual));
                    
                    prepararDashboard();
                } else {
                    errorMsg.innerText = result.message;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = "Error de conexión. Verifica la URL de AppScript.";
                errorMsg.style.display = 'block';
            } finally {
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        function cerrarSesion() {
            // Borramos la sesión del navegador
            localStorage.removeItem('sesionSundde');
            usuarioActual = {};
            denunciasDescargadas = [];
            
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'block';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('cards-container').innerHTML = '';
            document.getElementById('login-error').style.display = 'none';
        }

        // === 2. LÓGICA PARA CARGAR DENUNCIAS ===
        async function cargarDenuncias() {
            const loader = document.getElementById('dashboard-loader');
            const container = document.getElementById('cards-container');
            
            container.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: "getDenuncias", 
                        empresa: usuarioActual.empresa,
                        rol: usuarioActual.rol 
                    })
                });
                
                const result = await response.json();
                loader.style.display = 'none';

                if (result.success) {
                    denunciasDescargadas = result.data;
                    filtrarVista('Pendiente'); // Por defecto muestra solo las pendientes
                } else {
                    container.innerHTML = `<p style="color:red; font-weight:bold;">Error: ${result.message}</p>`;
                }
            } catch (error) {
                loader.style.display = 'none';
                container.innerHTML = '<p style="color:red; font-weight:bold;">Error de red al cargar la información.</p>';
            }
        }

        // === 3. LÓGICA DE FILTROS ===
        function filtrarVista(filtro) {
            document.getElementById('btn-pendientes').classList.remove('active');
            document.getElementById('btn-procede').classList.remove('active');
            document.getElementById('btn-noprocede').classList.remove('active');
            
            if(filtro === 'Pendiente') document.getElementById('btn-pendientes').classList.add('active');
            if(filtro === 'Procede') document.getElementById('btn-procede').classList.add('active');
            if(filtro === 'No Procede') document.getElementById('btn-noprocede').classList.add('active');

            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            let listaFiltrada = denunciasDescargadas.filter(d => {
                let estatusStr = d.Estatus ? d.Estatus.toString().trim() : "";
                if (filtro === 'Pendiente') {
                    // Si el estatus está vacío, es pendiente
                    return estatusStr === "";
                } else {
                    // Filtra por 'Procede' o 'No Procede'
                    return estatusStr.toLowerCase() === filtro.toLowerCase();
                }
            });

            if (listaFiltrada.length > 0) {
                listaFiltrada.forEach(denuncia => {
                    let tieneRespuesta = denuncia.Estatus && denuncia.Estatus.trim() !== "";
                    let textoBadge = tieneRespuesta ? denuncia.Estatus : "Pendiente de Revisión";
                    
                    let bgBadge = "#ffffff";
                    if(denuncia.Estatus === "Procede") bgBadge = "#d4edda";
                    if(denuncia.Estatus === "No Procede") bgBadge = "#f8d7da";
                    if(!tieneRespuesta) bgBadge = "#fff3cd";

                    const card = document.createElement('div');
                    card.className = 'glass-panel denuncia-card';
                    card.onclick = () => abrirModal(denuncia);
                    
                    card.innerHTML = `
                        <span class="status-badge" style="background: ${bgBadge};">${textoBadge}</span>
                        <h3 style="margin-bottom: 10px;">ID: ${denuncia.ID_Denuncia}</h3>
                        <p><strong>Empresa:</strong> ${denuncia.Empresa_Implicada}</p>
                        <p><strong>Denunciante:</strong> ${denuncia.Denunciante}</p>
                        <p><strong>Producto:</strong> ${denuncia.Producto}</p>
                        <p style="margin-top: 10px; font-size: 0.85rem; font-weight: bold;">Hacer clic para gestionar.</p>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = '<p style="text-align:center; width: 100%; font-weight:bold;">No se encontraron denuncias en esta categoría.</p>';
            }
        }

        // === 4. LÓGICA DEL MODAL FLOTANTE ===
        function abrirModal(denuncia) {
            denunciaSeleccionada = denuncia;
            
            document.getElementById('modal-titulo').innerText = "Detalles del Caso " + denuncia.ID_Denuncia;
            document.getElementById('modal-denunciante').innerText = denuncia.Denunciante;
            document.getElementById('modal-cedula').innerText = denuncia.Cedula_Denunciante;
            document.getElementById('modal-telefono').innerText = denuncia.Telefono;
            document.getElementById('modal-empresaimplicada').innerText = denuncia.Empresa_Implicada;
            document.getElementById('modal-producto').innerText = denuncia.Producto;
            document.getElementById('modal-motivo').innerText = denuncia.Motivo_De_La_Denuncia;

            document.getElementById('respuesta-texto').value = '';
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('mensaje-exito').style.display = 'none';
            
            let btnEnviar = document.getElementById('btn-enviar-respuesta');
            btnEnviar.innerText = "Confirmar y Enviar a Base de Datos";
            btnEnviar.disabled = false;
            btnEnviar.style.display = 'block';

            if (denuncia.Estatus && denuncia.Estatus.trim() !== "") {
                document.getElementById('decision-box').style.display = 'none';
                document.getElementById('explanation-label').innerHTML = `Estado: <strong>${denuncia.Estatus}</strong><br>Respuesta Registrada:`;
                document.getElementById('respuesta-texto').value = denuncia.Respuesta_Empresa || "(Sin comentarios adicionales)";
                document.getElementById('respuesta-texto').readOnly = true;
                btnEnviar.style.display = 'none';
                document.getElementById('explanation-box').style.display = 'block';
            } else {
                document.getElementById('decision-box').style.display = 'block';
                document.getElementById('respuesta-texto').readOnly = false;
            }

            document.getElementById('details-modal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('details-modal').style.display = 'none';
            denunciaSeleccionada = null;
        }

        function mostrarExplicacion(decision) {
            prefijoDecision = decision; 
            const box = document.getElementById('explanation-box');
            const label = document.getElementById('explanation-label');
            
            box.style.display = 'block';
            document.getElementById('respuesta-texto').focus();
            
            if(decision === 'Procede') {
                label.innerHTML = "Indique las instrucciones para realizar el cambio del producto o reparación:";
            } else {
                label.innerHTML = "Explique al denunciante el motivo legal o técnico por el cual NO procede:";
            }
        }

        async function enviarRespuesta() {
            const textoExplicacion = document.getElementById('respuesta-texto').value;
            const btn = document.getElementById('btn-enviar-respuesta');
            const msgExito = document.getElementById('mensaje-exito');

            if (!textoExplicacion.trim()) {
                alert("Por favor, escriba una explicación para el sistema antes de enviar.");
                return;
            }

            btn.innerText = "Enviando a Base de Datos...";
            btn.disabled = true;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: "updateRespuesta", 
                        id: denunciaSeleccionada.ID_Denuncia, 
                        estatus: prefijoDecision,         
                        respuesta: textoExplicacion       
                    })
                });
                
                const result = await response.json();

                if (result.success) {
                    msgExito.innerText = "¡Estatus actualizado y respuesta guardada!";
                    msgExito.style.display = 'block';
                    btn.style.display = 'none';
                    
                    cargarDenuncias();
                    
                    setTimeout(cerrarModal, 2500);
                } else {
                    alert("Error del servidor: " + result.message);
                    btn.innerText = "Intentar de nuevo";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Error de conexión. Intente nuevamente.");
                btn.innerText = "Intentar de nuevo";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
