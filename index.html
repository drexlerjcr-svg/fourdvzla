<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gestión - Liquid Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* === VARIABLES Y RESET === */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-color: #000000;
            --accent-color: rgba(255, 255, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-image: url('https://i.ibb.co/Z1phdF8M/fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* === CLASES BASE LIQUID GLASS === */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
        }

        /* === PANTALLA DE LOGIN === */
        #login-view {
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .app-logo {
            width: 160px;
            margin-bottom: 30px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: block;
            opacity: 0.9;
        }

        input[type="email"], input[type="password"], textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
        }

        #login-view button.btn-primary {
            width: 100%;
            padding: 14px;
            background: #000000;
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        #login-view button.btn-primary:hover {
            background: #222222;
            transform: translateY(-2px);
        }

        /* === PANTALLA DASHBOARD === */
        #dashboard-view {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-radius: 0 0 24px 24px;
            margin-bottom: 20px;
        }

        .header-logo {
            height: 50px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
        }

        .user-profile-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            text-align: right;
            font-size: 0.9rem;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(220, 53, 69, 0.8);
            border-color: rgba(220, 53, 69, 1);
        }

        .cards-container {
            flex: 1;
            padding: 0 5% 30px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            align-content: start;
        }

        .denuncia-card {
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }

        .denuncia-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status-pendiente { background: rgba(255, 193, 7, 0.8); color: black; }
        .status-revisado { background: rgba(40, 167, 69, 0.8); color: white; }

        /* === MODAL FLOTANTE === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #ffffff;
            color: #000000;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: none;
            border: none;
            color: #000000;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .decision-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #dddddd;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-content button.btn-primary {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            flex: 1;
        }
        
        .modal-content button.btn-primary:hover {
            background: #333333;
        }
        
        .modal-content button.btn-primary:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        #explanation-box {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.4s ease;
        }
        
        .modal-content textarea {
            background: #f5f5f5;
            color: #000;
            border: 1px solid #ccc;
        }
        .modal-content textarea:focus {
            background: #fff;
            border-color: #000;
        }

        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-view" class="glass-panel">
        <img src="https://i.ibb.co/1f607SYR/logosundde.png" alt="Logo" class="app-logo">
        <h2>Iniciar Sesión</h2>
        <p style="font-size: 0.85rem; margin-bottom: 25px; opacity: 0.8;">Portal de Sujetos de Aplicación</p>
        
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="usuario@empresa.com">
        </div>
        <div class="input-group">
            <label>Contraseña (Opcional por ahora)</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-primary" id="btn-login" onclick="ingresar()">Acceder al Sistema</button>
        <div id="login-loader" style="display:none; margin-top:15px;"><div class="loader"></div></div>
        <p id="login-error" style="color:#ff6b6b; font-size:0.85rem; margin-top:10px; display:none;"></p>
    </div>

    <div id="dashboard-view">
        <header class="glass-panel dashboard-header">
            <img src="https://i.ibb.co/1f607SYR/logosundde.png" alt="Logo Pequeño" class="header-logo">
            <div class="user-profile-container">
                <div class="user-profile">
                    <strong id="perfil-email">Usuario</strong><br>
                    <span id="perfil-empresa" style="opacity: 0.8;">Empresa</span>
                </div>
                <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </header>

        <div id="dashboard-loader" style="display:none; text-align:center; padding: 40px;"><div class="loader"></div><p>Cargando denuncias...</p></div>
        
        <main class="cards-container" id="cards-container">
            </main>
    </div>

    <div id="details-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="cerrarModal()">&times;</button>
            <h2 id="modal-titulo" style="margin-bottom: 15px;">Detalles de la Denuncia</h2>
            
            <div style="font-size: 0.95rem; line-height: 1.5; opacity: 0.9;">
                <p><strong>Denunciante:</strong> <span id="modal-denunciante"></span></p>
                <p><strong>Cédula:</strong> <span id="modal-cedula"></span></p>
                <p><strong>Teléfono:</strong> <span id="modal-telefono"></span></p>
                <p><strong>Producto:</strong> <span id="modal-producto"></span></p>
                <p><strong>Motivo de la denuncia:</strong> <span id="modal-motivo"></span></p>
            </div>

            <div class="decision-box" id="decision-box">
                <p style="font-weight: 600;">¿Cumple con las garantías?</p>
                <div class="btn-group">
                    <button class="btn-primary" onclick="mostrarExplicacion('Sí PROCEDE')">Sí</button>
                    <button class="btn-primary" onclick="mostrarExplicacion('NO PROCEDE')">No procede</button>
                </div>
            </div>

            <div id="explanation-box">
                <label id="explanation-label" style="display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600;"></label>
                <textarea id="respuesta-texto" rows="4" placeholder="Escriba detalladamente su respuesta aquí..."></textarea>
                <button class="btn-primary" id="btn-enviar-respuesta" style="margin-top: 15px; width: 100%;" onclick="enviarRespuesta()">Enviar Respuesta</button>
            </div>
            
            <p id="mensaje-exito" style="color: green; font-weight: bold; margin-top: 15px; display: none; text-align: center;"></p>
        </div>
    </div>

    <script>
        // URL EXACTA DE TU WEB APP
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLPFaUEDcH3EOMGykhCkk7UeufZjFSgJiNQRMwsi1FSKJA9eWVEbGB40cxExd9Z6U/exec";
        
        let usuarioActual = {};
        let denunciaSeleccionada = null;
        let prefijoDecision = ""; // Guardará si es "Sí PROCEDE" o "NO PROCEDE"

        // === 1. LÓGICA DE LOGIN ===
        async function ingresar() {
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');
            const loader = document.getElementById('login-loader');

            if (!email) {
                errorMsg.innerText = "Por favor ingrese su correo electrónico.";
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                // Hacer petición a Google Apps Script
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "login", email: email })
                });
                
                const result = await response.json();

                if (result.success) {
                    usuarioActual = result;
                    // Actualizar Header
                    document.getElementById('perfil-email').innerText = result.email;
                    document.getElementById('perfil-empresa').innerText = result.empresa;
                    
                    // Cambiar Vista
                    document.getElementById('login-view').style.display = 'none';
                    document.getElementById('dashboard-view').style.display = 'flex';
                    
                    // Cargar los datos de esa empresa
                    cargarDenuncias();
                } else {
                    errorMsg.innerText = result.message;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = "Error de conexión con el servidor.";
                errorMsg.style.display = 'block';
            } finally {
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        function cerrarSesion() {
            usuarioActual = {};
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'block';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('cards-container').innerHTML = '';
        }

        // === 2. LÓGICA PARA CARGAR DENUNCIAS ===
        async function cargarDenuncias() {
            const container = document.getElementById('cards-container');
            const loader = document.getElementById('dashboard-loader');
            
            container.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "getDenuncias", empresa: usuarioActual.empresa })
                });
                
                const result = await response.json();
                loader.style.display = 'none';

                if (result.success && result.data.length > 0) {
                    result.data.forEach(denuncia => {
                        // Determinar si ya tiene respuesta para cambiar el color de la etiqueta
                        let estadoClase = denuncia.Respuesta_Empresa ? "status-revisado" : "status-pendiente";
                        let estadoTexto = denuncia.Respuesta_Empresa ? "Revisado / Respondido" : "Pendiente de Revisión";

                        // Crear tarjeta HTML dinámicamente
                        const card = document.createElement('div');
                        card.className = 'glass-panel denuncia-card';
                        card.onclick = () => abrirModal(denuncia);
                        
                        card.innerHTML = `
                            <span class="status-badge ${estadoClase}">${estadoTexto}</span>
                            <h3 style="margin-bottom: 10px;">ID: ${denuncia.ID_Denuncia}</h3>
                            <p><strong>Denunciante:</strong> ${denuncia.Denunciante}</p>
                            <p><strong>Producto:</strong> ${denuncia.Producto}</p>
                            <p style="margin-top: 10px; font-size: 0.9rem; opacity: 0.9;">Hacer clic para ver detalles y gestionar.</p>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<p style="text-align:center; width: 100%;">No hay denuncias registradas para esta empresa.</p>';
                }
            } catch (error) {
                loader.style.display = 'none';
                container.innerHTML = '<p style="color:red; text-align:center; width: 100%;">Error al cargar los datos.</p>';
            }
        }

        // === 3. LÓGICA DEL MODAL FLOTANTE ===
        function abrirModal(denuncia) {
            denunciaSeleccionada = denuncia;
            
            // Llenar información
            document.getElementById('modal-titulo').innerText = "Detalles del Caso " + denuncia.ID_Denuncia;
            document.getElementById('modal-denunciante').innerText = denuncia.Denunciante;
            document.getElementById('modal-cedula').innerText = denuncia.Cedula_Denunciante;
            document.getElementById('modal-telefono').innerText = denuncia.Telefono;
            document.getElementById('modal-producto').innerText = denuncia.Producto;
            document.getElementById('modal-motivo').innerText = denuncia.Motivo_De_La_Denuncia;

            // Limpiar caja de texto y mensajes
            document.getElementById('respuesta-texto').value = '';
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('mensaje-exito').style.display = 'none';
            document.getElementById('btn-enviar-respuesta').innerText = "Enviar Respuesta";
            document.getElementById('btn-enviar-respuesta').disabled = false;

            // Si ya fue respondida, ocultar botones de decisión y mostrar la respuesta
            if (denuncia.Respuesta_Empresa) {
                document.getElementById('decision-box').style.display = 'none';
                document.getElementById('explanation-label').innerHTML = "Respuesta ya enviada:";
                document.getElementById('respuesta-texto').value = denuncia.Respuesta_Empresa;
                document.getElementById('respuesta-texto').readOnly = true;
                document.getElementById('btn-enviar-respuesta').style.display = 'none';
                document.getElementById('explanation-box').style.display = 'block';
            } else {
                document.getElementById('decision-box').style.display = 'block';
                document.getElementById('respuesta-texto').readOnly = false;
                document.getElementById('btn-enviar-respuesta').style.display = 'block';
            }

            document.getElementById('details-modal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('details-modal').style.display = 'none';
            denunciaSeleccionada = null;
        }

        function mostrarExplicacion(decision) {
            prefijoDecision = decision; // Guardamos la decisión del botón
            const box = document.getElementById('explanation-box');
            const label = document.getElementById('explanation-label');
            
            box.style.display = 'block';
            document.getElementById('respuesta-texto').focus();
            
            if(decision === 'Sí PROCEDE') {
                label.innerHTML = "Indique las instrucciones para realizar el cambio del producto o reparación:";
            } else {
                label.innerHTML = "Explique al denunciante el motivo legal o técnico por el cual NO procede:";
            }
        }

        async function enviarRespuesta() {
            const textoExplicacion = document.getElementById('respuesta-texto').value;
            const btn = document.getElementById('btn-enviar-respuesta');
            const msgExito = document.getElementById('mensaje-exito');

            if (!textoExplicacion.trim()) {
                alert("Por favor, escriba una explicación antes de enviar.");
                return;
            }

            btn.innerText = "Enviando...";
            btn.disabled = true;

            // Concatenar la decisión (Sí/No) con el texto que escribió el usuario
            const respuestaFinal = `[${prefijoDecision}] - ${textoExplicacion}`;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: "updateRespuesta", 
                        id: denunciaSeleccionada.ID_Denuncia, 
                        respuesta: respuestaFinal 
                    })
                });
                
                const result = await response.json();

                if (result.success) {
                    msgExito.innerText = "¡Respuesta registrada en la base de datos!";
                    msgExito.style.display = 'block';
                    btn.style.display = 'none';
                    
                    // Recargar tarjetas en el fondo para que aparezca como "Revisado"
                    cargarDenuncias();
                    
                    // Cerrar modal automáticamente después de 2 segundos
                    setTimeout(cerrarModal, 2000);
                } else {
                    alert("Error al guardar: " + result.message);
                    btn.innerText = "Intentar de nuevo";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Error de conexión al enviar respuesta.");
                btn.innerText = "Intentar de nuevo";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
