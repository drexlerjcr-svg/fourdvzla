<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF | Sistema de Gestión Fiscal - Venezuela</title>
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root { --azul: #012A8C; --amarillo: #F4A41C; --rojo: #A92631; }
        .bg-azul { background-color: var(--azul); }
        .text-azul { color: var(--azul); }
        .border-amarillo { border-color: var(--amarillo); }
        .sidebar-item:hover { background-color: rgba(244, 164, 28, 0.1); border-left: 4px solid var(--amarillo); }
        .active-link { background-color: rgba(244, 164, 28, 0.2); border-left: 4px solid var(--amarillo); }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased overflow-hidden">

    <!-- Pantalla de Login (Overlay) -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-azul flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
            <div class="text-center mb-8">
                <div class="bg-azul inline-block p-4 rounded-full mb-4">
                    <i class="fas fa-shield-halved text-white text-4xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-azul">Fiscalización Venezuela</h1>
                <p class="text-gray-500 text-sm">Ingrese sus credenciales seguras</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Correo Electrónico</label>
                    <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-azul outline-none transition" placeholder="usuario@fiscal.gob.ve" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Contraseña</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-azul outline-none transition" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-azul text-white font-bold py-3 rounded-lg hover:opacity-90 transition shadow-lg">
                    INICIAR SESIÓN
                </button>
            </form>
            <p id="login-error" class="text-rojo text-center mt-4 text-sm hidden font-bold"></p>
        </div>
    </div>

    <!-- Layout Principal (Post-Login) -->
    <div id="main-layout" class="flex h-screen hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-azul text-white flex flex-col shadow-xl">
            <div class="p-6 border-b border-blue-900">
                <span class="text-xl font-black tracking-tighter">SISTEMA <span class="text-amarillo">FISCAL</span></span>
            </div>
            <nav class="flex-1 mt-4 px-2 space-y-1" id="nav-menu">
                <!-- Se inyecta según rol -->
            </nav>
            <div class="p-4 border-t border-blue-900">
                <button id="btn-logout" class="flex items-center space-x-3 w-full p-3 rounded-lg hover:bg-red-800 transition text-[#A92631] font-bold bg-white shadow">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Header superior -->
            <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm">
                <div id="breadcrumb" class="text-gray-500 font-medium">Dashboard / Monitoreo</div>
                <div class="flex items-center space-x-4">
                    <span id="user-role-badge" class="bg-amarillo text-azul text-[10px] font-bold px-2 py-1 rounded-full">ROL: ANALISTA</span>
                    <span id="user-email-display" class="text-sm font-semibold text-azul italic">usuario@fiscal.gob.ve</span>
                </div>
            </header>

            <!-- Vista Dinámica -->
            <section id="content-area" class="flex-1 overflow-y-auto p-8 bg-gray-50">
                <!-- Aquí se cargan las vistas -->
            </section>
        </main>
    </div>

    <!-- Scripts de Firebase y Lógica -->
    <script type="module" src="main.js"></script>
</body>
</html>
