<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Centralizado de Denuncias - SUNDDE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1E3A8A;       
            --secondary: #0284C7;     
            --success: #10B981;       
            --warning: #F59E0B;       
            --danger: #EF4444;        
            --dark: #0F172A;          
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(15, 23, 42, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

        body {
            background: linear-gradient(135deg, #E0E7FF 0%, #E0F2FE 50%, #F1F5F9 100%);
            min-height: 100vh;
            color: var(--dark);
            background-attachment: fixed;
        }

        /* Utilidades Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
        }

        /* --- LOGIN --- */
        #login-view {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box img { width: 120px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.9);
            font-size: 14px; transition: 0.3s;
        }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(2,132,199,0.2); }
        
        .btn-primary {
            background: var(--primary); color: white; border: none;
            padding: 12px 24px; border-radius: 8px; font-weight: bold;
            cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-primary:hover { background: #1e3a8aed; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30,58,138,0.3); }

        .btn-action {
            background: var(--secondary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; margin-top: 10px; transition: 0.2s;
        }
        .btn-action:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); color: #000; }

        /* --- APP LAYOUT --- */
        #app-view { display: none; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; margin-bottom: 30px; position: sticky; top: 0; z-index: 100;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .user-details h3 { font-size: 16px; margin-bottom: 2px; }
        .user-details p { font-size: 12px; color: #475569; font-weight: 600; text-transform: uppercase;}
        
        .nav-links { display: flex; gap: 20px; }
        .nav-link { cursor: pointer; font-weight: 600; color: var(--primary); padding: 8px 16px; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(30, 58, 138, 0.1); }

        .main-container { padding: 0 30px 40px; max-width: 1400px; margin: 0 auto; }
        .workspace-view { display: none; }
        .workspace-view.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER & FILTERS --- */
        .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .view-header h2 { color: var(--primary); }
        .filters { display: flex; gap: 15px; align-items: center; }
        .filters select { padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.1); background: white; font-weight: 600; color: var(--dark); outline: none; }

        /* --- CARDS GRID --- */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .denuncia-card { padding: 20px; position: relative; overflow: hidden; }
        
        .card-badge {
            position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-pendiente { background: #FEF3C7; color: #D97706; }
        .badge-admitido { background: #DBEAFE; color: #1D4ED8; }
        .badge-atendido { background: #D1FAE5; color: #047857; }
        .badge-revision { background: #FEE2E2; color: #B91C1C; }
        .badge-cerrado { background: #E0E7FF; color: #4338CA; }

        .card-title { font-size: 14px; color: #64748B; margin-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px;}
        .card-title strong { color: var(--primary); font-size: 16px; }

        .info-group { margin-bottom: 15px; background: rgba(255,255,255,0.4); padding: 12px; border-radius: 8px; border-left: 3px solid var(--secondary); }
        .info-group h4 { font-size: 13px; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-group p { font-size: 13px; margin-bottom: 4px; color: #334155; }
        .info-group p i { width: 18px; color: var(--secondary); }
        
        .history-box { background: rgba(241, 245, 249, 0.7); border-left: 3px solid var(--warning); margin-top: 10px; }
        .file-link { display: inline-block; background: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; color: var(--danger); text-decoration: none; border: 1px solid #e2e8f0; margin-top: 5px; margin-right: 5px; transition: 0.2s;}
        .file-link:hover { background: #f8fafc; transform: translateY(-1px); }

        .action-area { margin-top: 20px; padding-top: 15px; border-top: 1px dashed rgba(0,0,0,0.1); }

        /* --- ANALYTICS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 25px; text-align: center; position: relative; overflow: hidden; }
        .stat-card i { font-size: 40px; margin-bottom: 15px; opacity: 0.8; }
        .stat-value { font-size: 36px; font-weight: 800; margin-bottom: 5px; }
        .stat-label { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .stat-blue { color: #1E40AF; border-bottom: 4px solid #1E40AF; }
        .stat-green { color: #065F46; border-bottom: 4px solid #065F46; }
        .stat-red { color: #991B1B; border-bottom: 4px solid #991B1B; }
        .stat-purple { color: #5B21B6; border-bottom: 4px solid #5B21B6; }

        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 999; justify-content: center; align-items: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="overlay"><div class="loader"></div></div>

    <div id="login-view">
        <div class="glass-panel login-box">
            <img src="https://i.ibb.co/FkCTxv9M/denunciass.png" alt="SUNDDE Logo">
            <h2 style="color: var(--primary); margin-bottom: 25px;">Portal Institucional</h2>
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="login-email" placeholder="usuario@sundde.gob.ve">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="ejecutarLogin()">Iniciar Sesión</button>
        </div>
    </div>

    <div id="app-view">
        <div class="glass-panel topbar">
            <div class="user-info">
                <div class="user-avatar" id="avatar-initial">A</div>
                <div class="user-details">
                    <h3 id="user-name-display">Nombre Usuario</h3>
                    <p id="user-role-display">Rol del Usuario</p>
                </div>
            </div>
            <div class="nav-links">
                <div class="nav-link active" onclick="switchView('view-bandeja')" id="link-bandeja"><i class="fas fa-inbox"></i> Bandeja Operativa</div>
                <div class="nav-link" onclick="switchView('view-analytics')" id="link-stats" style="display: none;"><i class="fas fa-chart-pie"></i> Estadísticas</div>
                <div class="nav-link" onclick="triggerLogout()"><i class="fas fa-sign-out-alt"></i> Salir</div>
            </div>
        </div>

        <div class="main-container">
            
            <div id="view-bandeja" class="workspace-view active">
                <div class="view-header">
                    <h2><i class="fas fa-folder-open"></i> Expedientes Activos</h2>
                    <div class="filters" id="filter-container" style="display: none;">
                        <label style="font-size: 13px; font-weight: bold; color: var(--primary);">Filtrar por Estatus:</label>
                        <select id="filter-estatus" onchange="renderGrid()">
                            <option value="ALL">Todos los estatus permitidos</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Admitido">Admitido</option>
                            <option value="Atendido">Atendido</option>
                            <option value="En Revisión">En Revisión</option>
                            <option value="Cerrado">Cerrado</option>
                        </select>
                    </div>
                </div>
                <div class="cards-grid" id="cards-container">
                    </div>
            </div>

            <div id="view-analytics" class="workspace-view">
                <div class="view-header">
                    <h2><i class="fas fa-chart-line"></i> Analítica General</h2>
                    <button class="btn-action" onclick="loadAnalyticsData()"><i class="fas fa-sync-alt"></i> Actualizar</button>
                </div>
                <div class="stats-grid">
                    <div class="glass-panel stat-card stat-blue">
                        <i class="fas fa-file-import"></i>
                        <div class="stat-value" id="stat-recibidas">0</div>
                        <div class="stat-label">Denuncias Totales</div>
                    </div>
                    <div class="stat-card glass-panel stat-warning" style="color: #B45309; border-bottom: 4px solid #B45309;">
                        <i class="fas fa-tools"></i>
                        <div class="stat-value" id="stat-atendidas">0</div>
                        <div class="stat-label">En Proceso / Atendidas</div>
                    </div>
                    <div class="glass-panel stat-card stat-green">
                        <i class="fas fa-check-circle"></i>
                        <div class="stat-value" id="stat-cerradas">0</div>
                        <div class="stat-label">Casos Cerrados</div>
                    </div>
                    <div class="glass-panel stat-card stat-purple">
                        <i class="fas fa-star"></i>
                        <div class="stat-value" id="stat-satisfaccion">0.0</div>
                        <div class="stat-label">Índice Satisfacción ( /5 )</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const webappurl = "https://script.google.com/macros/s/AKfycbwWXfBCKhl6addzTvQCO_Ap_TYruZ2-UKttkgzO12xXhIksB8B8asg7330UfF6JqQU/exec";
        let currentUser = null;
        let globalData = [];

        function showLoading(show) { document.getElementById('overlay').style.display = show ? 'flex' : 'none'; }

        async function sendToBackend(action, payload) {
            try {
                const response = await fetch(webappurl, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, payload: payload })
                });
                return { success: true, message: "Petición enviada. Si es actualización, espere unos segundos y recargue." };
            } catch (error) {
                return { success: false, message: error.toString() };
            }
        }

        async function fetchWithJSON(action, payload) {
            try {
                const response = await fetch(webappurl, {
                    method: 'POST',
                    body: JSON.stringify({ action: action, payload: payload })
                });
                return await response.json();
            } catch (error) {
                console.error("Error Fetch:", error);
                return null;
            }
        }

        async function ejecutarLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if(!email || !pass) return alert("Ingrese credenciales");
            
            showLoading(true);
            const res = await fetchWithJSON("loginUser", { email, pass });
            showLoading(false);

            if(res && res.success) {
                currentUser = res;
                document.getElementById('user-name-display').innerText = currentUser.nombre;
                document.getElementById('user-role-display').innerText = currentUser.role + (currentUser.empresa ? ` - ${currentUser.empresa}` : '');
                document.getElementById('avatar-initial').innerText = currentUser.nombre.charAt(0).toUpperCase();
                
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'block';

                if(currentUser.role === "Administrador General") {
                    document.getElementById('link-stats').style.display = "block";
                    document.getElementById('filter-container').style.display = "flex";
                } else if(currentUser.role === "Asistente SUNDDE") {
                    document.getElementById('filter-container').style.display = "flex";
                } else {
                    document.getElementById('link-stats').style.display = "none";
                    document.getElementById('filter-container').style.display = "none";
                }

                await loadDataGrid();
            } else {
                alert(res ? res.message : "Error de conexión");
            }
        }

        async function loadDataGrid() {
            showLoading(true);
            const res = await fetchWithJSON("getDenuncias", { user: currentUser.email });
            showLoading(false);
            if(res) {
                globalData = res;
                renderGrid();
                if(currentUser.role === "Administrador General") loadAnalyticsData();
            }
        }

        function getFileBadgeHTML(url, title) {
            if(!url || url.trim() === "") return "";
            return `<a href="${url}" target="_blank" class="file-link"><i class="fas fa-file-pdf"></i> ${title}</a>`;
        }

        function renderGrid() {
            const container = document.getElementById('cards-container');
            container.innerHTML = "";
            const filterVal = document.getElementById('filter-estatus').value;

            globalData.forEach(row => {
                // Lógica de Filtro Global (Admin y Asistente)
                if((currentUser.role === "Administrador General" || currentUser.role === "Asistente SUNDDE") && filterVal !== "ALL") {
                    if(row.Estatus !== filterVal) return;
                }

                // Reglas de Visibilidad por Rol
                let visible = false;
                if(currentUser.role === "Analista SUNDDE" && row.Estatus === "Pendiente") visible = true;
                if(currentUser.role === "Analista Denunciado" && row.Empresa === currentUser.empresa) {
                    if(row.Estatus === "Admitido" || row.Estatus === "En Revisión") visible = true;
                }
                if(currentUser.role === "Fiscal SUNDDE") {
                    if(row.Estatus === "Atendido" || row.Estatus.includes("Atendido")) visible = true;
                }
                if(currentUser.role === "Asistente SUNDDE" && row.Estatus !== "Archivado") visible = true;
                if(currentUser.role === "Administrador General") visible = true;

                if(!visible) return;

                // Construcción de la Card
                const card = document.createElement('div');
                card.className = "glass-panel denuncia-card";
                
                let badgeClass = "badge-pendiente";
                if(row.Estatus === "Admitido") badgeClass = "badge-admitido";
                if(row.Estatus.includes("Atendido")) badgeClass = "badge-atendido";
                if(row.Estatus === "En Revisión") badgeClass = "badge-revision";
                if(row.Estatus === "Cerrado") badgeClass = "badge-cerrado";

                let html = `
                    <div class="card-badge ${badgeClass}">${row.Estatus}</div>
                    <div class="card-title">Expediente: <strong>${row.ID_Denuncia}</strong> <br><small><i class="far fa-calendar-alt"></i> ${row.Fecha_Creacion ? row.Fecha_Creacion.substring(0,10) : 'N/A'}</small></div>
                    
                    <div class="info-group">
                        <h4>Datos del Denunciante</h4>
                        <p><i class="fas fa-user"></i> ${row.Denunciante} (C.I: ${row.Cedula_Denunciante})</p>
                        <p><i class="fas fa-phone"></i> ${row.Telefono}</p>
                        <p><i class="fas fa-envelope"></i> ${row.Correo_Denunciante}</p>
                    </div>

                    <div class="info-group">
                        <h4>Detalles de la Denuncia</h4>
                        <p><strong>Empresa:</strong> ${row.Empresa}</p>
                        <p><strong>Producto/Servicio:</strong> ${row.Producto}</p>
                        <p><strong>Motivo:</strong> ${row.Motivo_De_La_Denuncia}</p>
                    </div>
                `;

                // BLOQUES DINÁMICOS SEGÚN HISTÓRICO Y ROL
                const isAsistenteOrAdmin = (currentUser.role === "Asistente SUNDDE" || currentUser.role === "Administrador General");
                
                // Mostrar Soportes SUNDDE
                if (row.PDF_SUNDDE && (row.Estatus !== "Pendiente" || isAsistenteOrAdmin)) {
                    html += `<div class="info-group history-box">
                                <h4>Soporte SUNDDE</h4>
                                ${getFileBadgeHTML(row.PDF_SUNDDE, "Acta SUNDDE")}
                             </div>`;
                }

                // Mostrar 1ra Respuesta Empresa
                if (row.Respuesta_Empresa && (currentUser.role === "Fiscal SUNDDE" || row.Estatus === "En Revisión" || isAsistenteOrAdmin)) {
                     html += `<div class="info-group history-box">
                                <h4>Atención Empresa</h4>
                                <p>${row.Respuesta_Empresa}</p>
                                ${getFileBadgeHTML(row.PDF_Empresa, "PDF Empresa")}
                                ${getFileBadgeHTML(row.Foto_Empresa, "Foto Empresa")}
                             </div>`;
                }

                // Mostrar Comentario Fiscal (Devolución)
                if (row.Comentario_Fiscal && (row.Estatus === "En Revisión" || isAsistenteOrAdmin || (currentUser.role === "Fiscal SUNDDE" && row.Comentario_Devolucion_Empresa))) {
                     html += `<div class="info-group history-box" style="border-left-color: var(--danger);">
                                <h4>Devolución Fiscal</h4>
                                <p>${row.Comentario_Fiscal}</p>
                             </div>`;
                }

                // Mostrar Respuesta Devolución Empresa (NUEVAS COLUMNAS)
                if (row.Comentario_Devolucion_Empresa && (currentUser.role === "Fiscal SUNDDE" || isAsistenteOrAdmin)) {
                     html += `<div class="info-group history-box">
                                <h4>Atención Devolución</h4>
                                <p>${row.Comentario_Devolucion_Empresa}</p>
                                ${getFileBadgeHTML(row.PDF_Devolucion_Empresa, "PDF Corrección")}
                                ${getFileBadgeHTML(row.Foto_Devolucion_Empresa, "Foto Corrección")}
                             </div>`;
                }

                // Mostrar Cierre Fiscal
                if (row.PDF_Fiscal && isAsistenteOrAdmin) {
                     html += `<div class="info-group history-box" style="border-left-color: var(--success);">
                                <h4>Cierre de Caso</h4>
                                ${getFileBadgeHTML(row.PDF_Fiscal, "Acta Conforme Fiscal")}
                             </div>`;
                }

                // ZONA DE ACCIONES SEGÚN ROL
                html += `<div class="action-area">`;

                if(currentUser.role === "Analista SUNDDE" && row.Estatus === "Pendiente") {
                    html += `
                        <div class="input-group">
                            <label>Cargar Acta SUNDDE (PDF)</label>
                            <input type="file" id="fileSUNDDE_${row.rowIndex}" accept=".pdf">
                        </div>
                        <button class="btn-action btn-primary" onclick="procesarAccion('SUNDDE_ADMITIR', ${row.rowIndex})">Admitir Caso</button>
                    `;
                }

                if(currentUser.role === "Analista Denunciado") {
                    if(row.Estatus === "Admitido") {
                        html += `
                            <div class="input-group"><label>Respuesta de Atención</label><textarea id="comentarioEmpresa_${row.rowIndex}"></textarea></div>
                            <div class="input-group"><label>Soporte (PDF)</label><input type="file" id="pdfEmpresa_${row.rowIndex}" accept=".pdf"></div>
                            <div class="input-group"><label>Evidencia (Foto)</label><input type="file" id="fotoEmpresa_${row.rowIndex}" accept="image/*"></div>
                            <button class="btn-action btn-success" onclick="procesarAccion('EMPRESA_ATENDER', ${row.rowIndex})">Cargar Atención</button>
                        `;
                    } else if(row.Estatus === "En Revisión") {
                        // Formulario para las NUEVAS columnas
                        html += `
                            <div class="input-group"><label>Nueva Respuesta (Corrección)</label><textarea id="comentarioDevolucion_${row.rowIndex}"></textarea></div>
                            <div class="input-group"><label>Soporte Corrección (PDF)</label><input type="file" id="pdfDevolucion_${row.rowIndex}" accept=".pdf"></div>
                            <div class="input-group"><label>Evidencia Corrección (Foto)</label><input type="file" id="fotoDevolucion_${row.rowIndex}" accept="image/*"></div>
                            <button class="btn-action btn-success" onclick="procesarAccion('EMPRESA_ATENDER_DEVOLUCION', ${row.rowIndex})">Cargar Nueva Atención</button>
                        `;
                    }
                }

                if(currentUser.role === "Fiscal SUNDDE" && row.Estatus.includes("Atendido")) {
                    html += `
                        <div class="input-group" id="divConforme_${row.rowIndex}">
                            <label>Cargar Acta de Cierre Fiscal (PDF)</label>
                            <input type="file" id="pdfFiscal_${row.rowIndex}" accept=".pdf">
                            <button class="btn-action btn-success" onclick="procesarAccion('FISCAL_CONFORME', ${row.rowIndex}, '${row.Correo_Denunciante}')">Marcar Conforme</button>
                        </div>
                        <hr style="margin: 15px 0; border: 0; border-top: 1px dashed #ccc;">
                        <div class="input-group">
                            <label style="color:var(--danger)">Opcional: Motivo de Devolución</label>
                            <textarea id="motivoFiscal_${row.rowIndex}"></textarea>
                            <button class="btn-action btn-danger" onclick="procesarAccion('FISCAL_NOCONFORME', ${row.rowIndex})">Devolver Caso (No Conforme)</button>
                        </div>
                    `;
                }

                if(currentUser.role === "Asistente SUNDDE" && row.Estatus === "Cerrado") {
                    html += `
                        <div class="input-group">
                            <label>Puntuación Encuesta (1 al 5)</label>
                            <select id="encuesta_${row.rowIndex}">
                                <option value="5">5 - Excelente</option>
                                <option value="4">4 - Bueno</option>
                                <option value="3">3 - Regular</option>
                                <option value="2">2 - Malo</option>
                                <option value="1">1 - Pésimo</option>
                            </select>
                        </div>
                        <button class="btn-action btn-primary" onclick="procesarAccion('SEGUIMIENTO_ARCHIVAR', ${row.rowIndex})">Registrar y Archivar</button>
                    `;
                }

                if(currentUser.role === "Administrador General") {
                    if (row.Estatus === "Admitido" || row.Estatus === "En Revisión") {
                        html += `<button class="btn-action btn-warning" onclick="procesarAccion('ADMIN_ALERTA', ${row.rowIndex})"><i class="fas fa-bell"></i> Enviar Alerta a Empresa</button>`;
                    }
                }

                html += `</div>`; // Cierra action-area
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // --- CONVERSIÓN ARCHIVOS Y ENVÍO ---
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                if(!file) return resolve("");
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function procesarAccion(subAction, rowIndex, correoDenunciante = "") {
            let dataPayload = { rowIndex: rowIndex };
            showLoading(true);

            try {
                if(subAction === "SUNDDE_ADMITIR") {
                    const fileInput = document.getElementById(`fileSUNDDE_${rowIndex}`);
                    if(fileInput.files.length > 0) {
                        dataPayload.fileBase64 = await getBase64(fileInput.files[0]);
                        dataPayload.fileName = `Acta_SUNDDE_${rowIndex}.pdf`;
                    }
                }
                else if(subAction === "EMPRESA_ATENDER") {
                    dataPayload.comentario = document.getElementById(`comentarioEmpresa_${rowIndex}`).value;
                    const pdfInput = document.getElementById(`pdfEmpresa_${rowIndex}`);
                    const fotoInput = document.getElementById(`fotoEmpresa_${rowIndex}`);
                    if(pdfInput.files.length > 0) {
                        dataPayload.fileBase64 = await getBase64(pdfInput.files[0]);
                        dataPayload.fileName = `PDF_Empresa_${rowIndex}.pdf`;
                    }
                    if(fotoInput.files.length > 0) {
                        dataPayload.photoBase64 = await getBase64(fotoInput.files[0]);
                        dataPayload.photoName = `Foto_Empresa_${rowIndex}.png`;
                    }
                }
                else if(subAction === "EMPRESA_ATENDER_DEVOLUCION") {
                    // Carga desde los nuevos inputs de la Card "En Revisión"
                    dataPayload.comentarioDevolucion = document.getElementById(`comentarioDevolucion_${rowIndex}`).value;
                    const pdfInput = document.getElementById(`pdfDevolucion_${rowIndex}`);
                    const fotoInput = document.getElementById(`fotoDevolucion_${rowIndex}`);
                    if(pdfInput.files.length > 0) {
                        dataPayload.fileBase64 = await getBase64(pdfInput.files[0]);
                        dataPayload.fileName = `PDF_Devolucion_${rowIndex}.pdf`;
                    }
                    if(fotoInput.files.length > 0) {
                        dataPayload.photoBase64 = await getBase64(fotoInput.files[0]);
                        dataPayload.photoName = `Foto_Devolucion_${rowIndex}.png`;
                    }
                }
                else if(subAction === "FISCAL_CONFORME") {
                    const fileInput = document.getElementById(`pdfFiscal_${rowIndex}`);
                    if(fileInput.files.length > 0) {
                        dataPayload.fileBase64 = await getBase64(fileInput.files[0]);
                        dataPayload.fileName = `Acta_Cierre_Fiscal_${rowIndex}.pdf`;
                    }
                    dataPayload.correoDenunciante = correoDenunciante;
                }
                else if(subAction === "FISCAL_NOCONFORME") {
                    dataPayload.comentarioFiscal = document.getElementById(`motivoFiscal_${rowIndex}`).value;
                    if(!dataPayload.comentarioFiscal) {
                        showLoading(false); return alert("Debe escribir un motivo para la devolución.");
                    }
                }
                else if(subAction === "SEGUIMIENTO_ARCHIVAR") {
                    dataPayload.encuesta = document.getElementById(`encuesta_${rowIndex}`).value;
                }

                // Enviar usando el modo no-cors de Google Apps Script para evitar bloqueos
                await sendToBackend("procesarDenuncia", { subAction: subAction, data: dataPayload });
                alert("Acción procesada (El backend se actualizará en breve).");
                setTimeout(() => { loadDataGrid(); }, 3000); 

            } catch(e) {
                showLoading(false);
                alert("Error procesando archivos: " + e.message);
            }
        }

        async function loadAnalyticsData() {
            showLoading(true);
            const stats = await fetchWithJSON("getStats", {});
            showLoading(false);
            if(stats) {
                document.getElementById('stat-recibidas').innerText = stats.recibidas || 0;
                document.getElementById('stat-atendidas').innerText = stats.atendidas || 0;
                document.getElementById('stat-cerradas').innerText = stats.cerradas || 0;
                document.getElementById('stat-satisfaccion').innerText = stats.promedioSatisfaccion || "0.0";
            }
        }

        function switchView(viewId) {
            document.querySelectorAll('.workspace-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(event) event.currentTarget.classList.add('active');
        }

        function triggerLogout() {
            currentUser = null;
            document.getElementById('app-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('login-email').value = "";
            document.getElementById('login-pass').value = "";
        }
    </script>
