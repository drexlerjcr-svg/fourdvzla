<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartelera Fiscal</title>
  <style>
    :root {
      --primary-color: #ffffff;
      --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-gradient);
      color: var(--primary-color);
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
      transition: all 0.3s ease;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .card:hover, .card:active {
      transform: translateY(-10px);
      box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
      background: rgba(255, 255, 255, 0.15);
    }

    .card img {
      max-width: 120px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 20px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .card h2 { margin: 0; font-size: 1.5rem; transition: all 0.3s ease; }

    /* Modal Principal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      padding: 30px;
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      animation: modalFadeIn 0.3s ease;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 2rem;
      cursor: pointer;
      color: #666;
      transition: color 0.2s;
      z-index: 10;
    }

    .close-btn:hover { color: #e74c3c; }

    /* Galería de Documentos en el Modal */
    .doc-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      overflow-y: auto;
      padding: 10px 0;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .doc-gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      cursor: zoom-in;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .doc-gallery img:hover {
      transform: scale(1.05);
    }

    /* Sistema Lightbox (Zoom de imagen) */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 5px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    #loading { text-align: center; font-size: 1.5rem; margin-top: 50px; }

    /* =======================================
       MEDIA QUERY: TELÉFONOS EN HORIZONTAL 
       ======================================= */
    @media (max-height: 600px) and (orientation: landscape) {
      body {
        padding: 10px;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 20px;
      }
      .grid-container {
        gap: 15px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .card {
        padding: 15px;
        border-radius: 15px;
      }
      .card img {
        max-width: 80px;
        height: 60px;
        margin-bottom: 10px;
      }
      .card h2 {
        font-size: 1.1rem;
      }
      .modal-content {
        padding: 20px;
        max-height: 90vh;
      }
      .doc-gallery {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
        margin-top: 10px;
      }
      .doc-gallery img {
        height: 120px;
      }
    }

    /* =======================================
       MEDIA QUERY: SMART TV Y PANTALLAS GRANDES
       ======================================= */
    @media (min-width: 1500px) {
      .grid-container {
        max-width: 95%; /* Aprovecha el ancho completo del Smart TV */
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 40px;
      }
      h1 {
        font-size: 3.8rem;
        margin-bottom: 60px;
      }
      .card {
        padding: 45px 30px;
        border-radius: 25px;
      }
      .card img {
        max-width: 180px;
        height: 140px;
        margin-bottom: 25px;
      }
      .card h2 {
        font-size: 1.9rem;
      }
      .modal-content {
        max-width: 1200px;
        padding: 40px;
      }
      .modal-content h2 {
        font-size: 2.2rem;
      }
      .doc-gallery {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 25px;
      }
      .doc-gallery img {
        height: 280px;
      }
    }
  </style>
</head>
<body>

  <h1>Cartelera Fiscal Actuallizada</h1>
  <div id="loading">Cargando información...</div>
  <div class="grid-container" id="card-container"></div>

  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <h2 id="modal-title" style="margin-top:0;">Documentos</h2>
      <div class="doc-gallery" id="doc-gallery">
        </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Documento ampliado">
  </div>

  <script>
    let carteleraData = [];
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbzwhB8NAtujzexD-Ex9E_yGWiAmbW9ypYyuWCLLkNV_gX0Fqa-gShJUBzo9-cwaKnFh/exec';

    window.onload = function() {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(renderCards).withFailureHandler(showError).getCarteleraData();
      } else {
        fetch(webAppUrl + '?json=true')
          .then(res => { if (!res.ok) throw new Error('Error de red'); return res.json(); })
          .then(data => renderCards(data))
          .catch(err => showError(err));
      }
    };

    function renderCards(data) {
      document.getElementById('loading').style.display = 'none';
      const container = document.getElementById('card-container');
      container.innerHTML = ''; 
      carteleraData = data;

      data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openModal(index);

        const logo = item.logo_url ? item.logo_url : 'https://via.placeholder.com/120?text=' + item.titulo;

        card.innerHTML = `
          <img src="${logo}" alt="Logo de ${item.titulo}">
          <h2>${item.titulo}</h2>
        `;
        container.appendChild(card);
      });
    }

    function showError(err) {
      document.getElementById('loading').innerText = "Error al conectar con la cartelera: " + err.message;
    }

    function openModal(index) {
      const item = carteleraData[index];
      document.getElementById('modal-title').innerText = item.titulo;
      
      const gallery = document.getElementById('doc-gallery');
      gallery.innerHTML = ''; 

      if (item.documentos && item.documentos.length > 0) {
        item.documentos.forEach(docUrl => {
          const img = document.createElement('img');
          img.src = docUrl;
          img.title = "Haz clic para ampliar";
          img.onclick = function() { openLightbox(docUrl); };
          gallery.appendChild(img);
        });
      } else {
        gallery.innerHTML = '<p style="text-align:center; color:#666; width:100%; grid-column: 1 / -1;">No hay documentos cargados.</p>';
      }

      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function openLightbox(imgUrl) {
      document.getElementById('lightbox-img').src = imgUrl;
      document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
      document.getElementById('lightbox-img').src = '';
    }

    window.onclick = function(event) {
      const modal = document.getElementById('modal');
      const lightbox = document.getElementById('lightbox');
      if (event.target === modal && lightbox.style.display !== 'flex') {
        closeModal();
      }
    }
  </script>
</body>
</html>
