<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartelera Fiscal</title>
  <style>
    :root {
      --primary-color: #ffffff;
      --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    }
    body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-gradient); color: var(--primary-color); min-height: 100vh; padding: 20px; box-sizing: border-box; }
    h1 { text-align: center; font-size: 2.5rem; margin-bottom: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); transition: all 0.3s ease; }
    
    /* Botón flotante para subir archivos */
    .upload-icon-btn {
      position: absolute; top: 25px; right: 30px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%; width: 50px; height: 50px;
      display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100;
    }
    .upload-icon-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); }
    .upload-icon-btn svg { width: 28px; height: 28px; color: #fff; }

    .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; transition: all 0.3s ease; }
    .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }
    .card:hover { transform: translateY(-10px); box-shadow: 0 12px 40px 0 rgba(0,0,0,0.5); background: rgba(255, 255, 255, 0.15); }
    .card img { max-width: 120px; height: 100px; object-fit: contain; margin-bottom: 20px; border-radius: 10px; }
    .card h2 { margin: 0; font-size: 1.5rem; }

    /* Modales */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: rgba(255, 255, 255, 0.95); color: #333; padding: 30px; border-radius: 20px; max-width: 800px; width: 100%; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: modalFadeIn 0.3s ease; max-height: 85vh; display: flex; flex-direction: column; overflow-y: auto;}
    @keyframes modalFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #666; transition: color 0.2s; z-index: 10; }
    .close-btn:hover { color: #e74c3c; }

    /* Estilos del Modal de Subida */
    #upload-modal .modal-content { max-width: 500px; }
    .upload-form-group { margin-bottom: 20px; display: flex; flex-direction: column; text-align: left;}
    .upload-form-group label { font-weight: bold; margin-bottom: 8px; color: #2c3e50; }
    .upload-form-group select, .upload-form-group input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
    .btn-submit { background: #2980b9; color: white; border: none; padding: 12px 20px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; margin-top: 10px; }
    .btn-submit:hover:not(:disabled) { background: #1f6391; }
    .btn-submit:disabled { cursor: not-allowed; opacity: 0.6; }

    /* Último Documento y Botón Histórico Abajo a la Derecha */
    #latest-doc-img { max-width: 100%; max-height: 55vh; object-fit: contain; border-radius: 10px; cursor: zoom-in; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s; margin: 0 auto;}
    #latest-doc-img:hover { transform: scale(1.02); }
    #btn-history { position: absolute; bottom: 20px; right: 30px; background: #2980b9; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 10; }
    #btn-history:hover { background: #1f6391; }

    /* Nuevo Loader Dinámico (Spinner, Check y Cross) */
    #custom-loader-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(180, 190, 205, 0.6); backdrop-filter: blur(4px); z-index: 5000; justify-content: center; align-items: center; }
    .loader-card { background: #ffffff; border-radius: 20px; padding: 40px 30px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.15); min-width: 280px; animation: zoomIn 0.3s ease; }
    
    .spinner-anim { animation: spin 1s linear infinite; }
    .status-icon { width: 55px; height: 55px; margin: 0 auto 15px auto; display: block; }
    .loader-icon-blue { color: #2962ff; }
    
    .loader-title { font-weight: 700; font-size: 1.3rem; color: #1a1a1a; margin: 0 0 8px 0; font-family: 'Segoe UI', Roboto, sans-serif; }
    .loader-subtitle { color: #666; margin: 0; font-size: 1rem; font-family: 'Segoe UI', Roboto, sans-serif; }
    .btn-alert { background: #2980b9; color: white; border: none; padding: 10px 25px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: background 0.3s; font-weight: bold; margin-top: 20px;}
    .btn-alert:hover { background: #1f6391; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Alerta Personalizada (Card normal) */
    #custom-alert-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 6000; justify-content: center; align-items: center; padding: 20px; }
    #custom-alert-modal .modal-content { max-width: 400px; text-align: center; background: #fff; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: zoomIn 0.2s ease; }
    #custom-alert-modal h3 { margin-top: 0; color: #e74c3c; font-size: 1.5rem; margin-bottom: 15px;}

    /* Galería */
    .doc-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; overflow-y: auto; padding: 10px 0; margin-top: 20px; }
    .doc-gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; cursor: zoom-in; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s; }
    .doc-gallery img:hover { transform: scale(1.05); }

    /* Lightbox (Zoom Optimizado) */
    .lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out; overflow: hidden; }
    .close-lightbox-btn { position: absolute; top: 25px; right: 35px; font-size: 3.5rem; color: #ffffff; cursor: pointer; z-index: 2010; text-shadow: 0 4px 10px rgba(0,0,0,0.8); transition: color 0.3s; }
    .close-lightbox-btn:hover { color: #e74c3c; }

    /* Nuevo Botón Enviar Email */
    .send-email-btn { position: absolute; top: 25px; left: 35px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 2010; }
    .send-email-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); color: #2980b9; }
    .send-email-btn svg { width: 24px; height: 24px; color: #fff; transition: color 0.2s;}
    .send-email-btn:hover svg { color: #2980b9; }

    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 5px; box-shadow: 0 0 30px rgba(0,0,0,0.8); animation: zoomIn 0.3s ease; transition: transform 0.1s ease-out; transform-origin: center center; will-change: transform; transform: translateZ(0); }
    @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    #loading { text-align: center; font-size: 1.5rem; margin-top: 50px; }

    /* Modal de Correo Electrónico */
    #email-modal { z-index: 3000; }
    #email-modal .modal-content { max-width: 400px; text-align: center; }

    /* Media Queries */
    @media (max-height: 600px) and (orientation: landscape) {
      body { padding: 10px; } h1 { font-size: 1.8rem; margin-bottom: 20px; }
      .upload-icon-btn { top: 10px; right: 15px; width: 40px; height: 40px; }
      .grid-container { gap: 15px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .card { padding: 15px; border-radius: 15px; } .card img { max-width: 80px; height: 60px; margin-bottom: 10px; } .card h2 { font-size: 1.1rem; }
      .modal-content { padding: 20px; max-height: 90vh; } .doc-gallery { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 10px; } .doc-gallery img { height: 120px; }
      .close-lightbox-btn { top: 15px; right: 25px; font-size: 2.5rem; }
      .send-email-btn { top: 15px; left: 25px; width: 40px; height: 40px; }
      #btn-history { bottom: 10px; right: 15px; padding: 8px 15px; font-size: 0.9rem; }
    }
    @media (min-width: 1500px) {
      .grid-container { max-width: 95%; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 40px; }
      h1 { font-size: 3.8rem; margin-bottom: 60px; } .card { padding: 45px 30px; border-radius: 25px; } .card img { max-width: 180px; height: 140px; margin-bottom: 25px; } .card h2 { font-size: 1.9rem; }
      .modal-content { max-width: 1200px; padding: 40px; } .modal-content h2 { font-size: 2.2rem; } .doc-gallery { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; } .doc-gallery img { height: 280px; }
      .close-lightbox-btn { top: 35px; right: 45px; font-size: 4.5rem; }
      .send-email-btn { top: 35px; left: 45px; width: 60px; height: 60px; }
      .send-email-btn svg { width: 32px; height: 32px; }
      #btn-history { bottom: 30px; right: 40px; padding: 15px 30px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="upload-icon-btn" onclick="openUploadModal()" title="Subir Documentos">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
    </svg>
  </div>

  <h1>Cartelera Fiscal Actualizada</h1>
  <div id="loading">Cargando información...</div>
  <div class="grid-container" id="card-container"></div>

  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <h2 id="modal-title" style="margin-top:0;">Documentos</h2>
      
      <div id="latest-doc-container" style="text-align: center; margin-top: 15px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <p id="no-doc-msg" style="display:none; color:#666;">No hay documentos cargados.</p>
        <img id="latest-doc-img" src="" alt="Último documento cargado" title="Haz clic para ampliar" style="display: none;">
      </div>

      <div class="doc-gallery" id="doc-gallery" style="display: none;"></div>
      
      <button id="btn-history" style="display: none;">Histórico</button>
    </div>
  </div>

  <div class="modal-overlay" id="upload-modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeUploadModal()">&times;</span>
      <h2 style="margin-top:0; text-align:center;">Cargar Documento(s)</h2>
      
      <div class="upload-form-group" style="flex-direction: row; align-items: center; gap: 10px; margin-bottom: 10px;">
        <input type="checkbox" id="is-new-item" onchange="toggleNewItem()" style="width: 20px; height: 20px; cursor: pointer;">
        <label for="is-new-item" style="margin-bottom: 0; cursor: pointer;">Crear nueva institución</label>
      </div>

      <div class="upload-form-group" id="group-select">
        <label>Selecciona la Institución:</label>
        <select id="upload-select"></select>
      </div>
      
      <div class="upload-form-group" id="group-new" style="display: none;">
        <label>ID de la Institución (Ej: seniat):</label>
        <input type="text" id="new-id" placeholder="Sin espacios y en minúsculas preferiblemente">
        
        <label style="margin-top: 15px;">Título de la Institución:</label>
        <input type="text" id="new-title" placeholder="Ej: SENIAT">
        
        <label style="margin-top: 15px; color:#e67e22;">Sube el Logo (Solo Imágenes):</label>
        <input type="file" id="new-logo" accept="image/*"> 
      </div>

      <div class="upload-form-group">
        <label id="label-upload-file">Selecciona el(los) archivo(s):</label>
        <input type="file" id="upload-file" multiple accept="image/*, application/pdf"> 
      </div>

      <div class="upload-form-group" style="display: flex; flex-direction: row; gap: 15px;">
        <div style="flex: 1;">
          <label>Fecha de Creación:</label>
          <input type="date" id="fecha-creacion" style="width: 100%; box-sizing: border-box;">
        </div>
        <div style="flex: 1;">
          <label>Fecha de Vencimiento:</label>
          <input type="date" id="fecha-vencimiento" style="width: 100%; box-sizing: border-box;">
        </div>
      </div>

      <button class="btn-submit" onclick="handleUpload()" id="btn-upload">Subir Archivos</button>
    </div>
  </div>

  <div id="custom-loader-modal">
    <div class="loader-card" id="loader-card-content">
      </div>
  </div>

  <div id="custom-alert-modal">
    <div class="modal-content">
      <h3>Atención</h3>
      <p id="custom-alert-msg" style="font-size: 1.1rem; color: #333; margin-bottom: 25px;"></p>
      <button class="btn-alert" style="margin-top:0;" onclick="closeCustomAlert()">Aceptar</button>
    </div>
  </div>

  <div class="modal-overlay" id="email-modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeEmailModal()">&times;</span>
      <h3 style="margin-top:0;">Enviar Documento</h3>
      <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">El documento actualmente visualizado será enviado al correo ingresado.</p>
      
      <div class="upload-form-group">
        <label>Correo Electrónico:</label>
        <input type="email" id="target-email" placeholder="ejemplo@correo.com">
      </div>
      <button class="btn-submit" id="btn-send-email" onclick="sendEmail()">Enviar Correo</button>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox-btn" onclick="closeLightbox()">&times;</span>
    <div class="send-email-btn" onclick="event.stopPropagation(); openEmailModal()" title="Enviar por correo">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
      </svg>
    </div>
    <img id="lightbox-img" src="" alt="Documento ampliado" onclick="event.stopPropagation()">
  </div>

  <script>
    let carteleraData = [];
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbxSlrs9zHDC9dDDlilhyH1s4LL4w2K9H0oTAW2pbAoUQLjiGmMVuCs3nmgKh2EAhb2Y/exec';

    let scale = 1, pointX = 0, pointY = 0, startX = 0, startY = 0, touchStartDist = 0, lastScale = 1;

    window.onload = function() {
      fetchData(false);
      initTouchZoom();
      setInterval(function() { fetchData(true); }, 15000);
    };

    function fetchData(isSilent) {
      if (!isSilent) {
        // Optimización y Modo Local: Buscar datos cacheados
        const cachedData = localStorage.getItem('carteleraDataCache');
        if (cachedData) {
          try {
            renderCards(JSON.parse(cachedData));
          } catch(e) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('card-container').innerHTML = '';
          }
        } else {
          document.getElementById('loading').style.display = 'block';
          document.getElementById('card-container').innerHTML = '';
        }
      }

      // Validar si hay conexión a internet
      if (!navigator.onLine) {
        if (!isSilent && localStorage.getItem('carteleraDataCache')) {
          showCustomAlert("Estás en modo sin conexión. Mostrando información guardada localmente.");
        }
        document.getElementById('loading').style.display = 'none';
        return; // Detiene la búsqueda de nuevos datos
      }

      // Si hay internet, buscar actualizaciones silenciosamente
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(data => {
            localStorage.setItem('carteleraDataCache', JSON.stringify(data)); // Guarda nueva data localmente
            renderCards(data);
          })
          .withFailureHandler(err => {
            if (!localStorage.getItem('carteleraDataCache')) showError(err);
          }).getCarteleraData();
      } else {
        fetch(webAppUrl + '?json=true')
          .then(res => { if (!res.ok) throw new Error('Error de red'); return res.json(); })
          .then(data => {
            localStorage.setItem('carteleraDataCache', JSON.stringify(data)); // Guarda nueva data localmente
            renderCards(data);
          })
          .catch(err => {
            if (!localStorage.getItem('carteleraDataCache')) showError(err);
          });
      }
    }

    function renderCards(data) {
      document.getElementById('loading').style.display = 'none';
      const container = document.getElementById('card-container');
      container.innerHTML = ''; 
      carteleraData = data;

      data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openModal(index);
        const logo = item.logo_url ? item.logo_url : 'https://via.placeholder.com/120?text=' + item.titulo;
        card.innerHTML = `<img src="${logo}" alt="Logo de ${item.titulo}"><h2>${item.titulo}</h2>`;
        container.appendChild(card);
      });
    }

    function showError(err) { document.getElementById('loading').innerText = "Error: " + err.message; }

    /* =================================
       LÓGICA DEL MODAL VER DOCUMENTOS
       ================================= */
    function openModal(index) {
      const item = carteleraData[index];
      document.getElementById('modal-title').innerText = item.titulo;
      
      const latestImg = document.getElementById('latest-doc-img');
      const noDocMsg = document.getElementById('no-doc-msg');
      const gallery = document.getElementById('doc-gallery');
      const btnHistory = document.getElementById('btn-history');
      
      document.body.style.overflow = 'hidden'; 
      gallery.style.display = 'none';
      gallery.innerHTML = '';
      
      if (item.documentos && item.documentos.length > 0) {
        noDocMsg.style.display = 'none';
        latestImg.style.display = 'block';
        
        // Muestra la imagen principal (el más nuevo)
        const latestDocUrl = item.documentos[item.documentos.length - 1];
        latestImg.src = latestDocUrl;
        latestImg.onclick = function() { openLightbox(latestDocUrl); };
        
        // Muestra el botón de historial (ubicado abajo a la derecha por CSS)
        btnHistory.style.display = 'block';
        btnHistory.onclick = function() { showHistory(index); };
      } else {
        latestImg.style.display = 'none';
        btnHistory.style.display = 'none';
        noDocMsg.style.display = 'block';
      }
      
      document.getElementById('modal').style.display = 'flex';
    }

    function showHistory(index) {
      const item = carteleraData[index];
      const latestImg = document.getElementById('latest-doc-img');
      const btnHistory = document.getElementById('btn-history');
      const gallery = document.getElementById('doc-gallery');

      latestImg.style.display = 'none';
      btnHistory.style.display = 'none';
      
      gallery.style.display = 'grid';
      gallery.innerHTML = ''; 
      
      // Muestra el histórico invirtiendo el orden (más nuevos primero)
      const reversedDocs = [...item.documentos].reverse();
      
      reversedDocs.forEach(docUrl => {
        const img = document.createElement('img');
        img.src = docUrl; img.title = "Haz clic para ampliar";
        img.onclick = function() { openLightbox(docUrl); };
        gallery.appendChild(img);
      });
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = ''; }
    
    function openLightbox(imgUrl) { 
      document.getElementById('lightbox-img').src = imgUrl; 
      document.getElementById('lightbox').style.display = 'flex'; 
      document.body.style.overflow = 'hidden'; 
    }
    
    function closeLightbox() { 
      document.getElementById('lightbox').style.display = 'none'; 
      const img = document.getElementById('lightbox-img');
      img.src = ''; img.style.transform = '';
      scale = 1; pointX = 0; pointY = 0;
      if (document.getElementById('modal').style.display !== 'flex') document.body.style.overflow = '';
    }

    /* =================================
       LÓGICA DE CONTROL TÁCTIL (ZOOM LIBRE)
       ================================= */
    function initTouchZoom() {
      const img = document.getElementById('lightbox-img');
      const lightbox = document.getElementById('lightbox');
      if (!img) return;
      lightbox.addEventListener('click', function(e) { if (e.target === lightbox) { closeLightbox(); } });
      img.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
          startX = e.touches[0].clientX - pointX; startY = e.touches[0].clientY - pointY;
        } else if (e.touches.length === 2) {
          touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          lastScale = scale;
        }
      }, { passive: true });
      img.addEventListener('touchmove', function(e) {
        if (e.touches.length === 1 && scale > 1) {
          e.preventDefault(); pointX = e.touches[0].clientX - startX; pointY = e.touches[0].clientY - startY;
          img.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        } else if (e.touches.length === 2) {
          e.preventDefault();
          let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          scale = Math.min(Math.max(1, (dist / touchStartDist) * lastScale), 6);
          if (scale === 1) { pointX = 0; pointY = 0; }
          img.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }
      }, { passive: false });
    }

    /* =================================
       MODAL DE SUBIDA Y ALERTAS
       ================================= */
    function showCustomAlert(msg) {
      document.getElementById('custom-alert-msg').innerText = msg;
      document.getElementById('custom-alert-modal').style.display = 'flex';
    }
    function closeCustomAlert() { document.getElementById('custom-alert-modal').style.display = 'none'; }

    function toggleNewItem() {
      const isNew = document.getElementById('is-new-item').checked;
      document.getElementById('group-select').style.display = isNew ? 'none' : 'flex';
      document.getElementById('group-new').style.display = isNew ? 'flex' : 'none';
      document.getElementById('label-upload-file').innerText = isNew ? 'Selecciona el(los) archivo(s) (Opcional si es nueva):' : 'Selecciona el(los) archivo(s):';
    }

    function openUploadModal() {
      const select = document.getElementById('upload-select');
      select.innerHTML = '<option value="">-- Selecciona una opción --</option>';
      carteleraData.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item.titulo; opt.textContent = item.titulo; select.appendChild(opt);
      });
      document.getElementById('is-new-item').checked = false;
      toggleNewItem();
      document.getElementById('new-id').value = '';
      document.getElementById('new-title').value = '';
      document.getElementById('new-logo').value = '';
      document.getElementById('upload-file').value = '';
      document.getElementById('fecha-creacion').value = '';
      document.getElementById('fecha-vencimiento').value = '';
      document.getElementById('btn-upload').disabled = false;
      document.getElementById('upload-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeUploadModal() { document.getElementById('upload-modal').style.display = 'none'; document.body.style.overflow = ''; }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error);
      });
    }

    /* =================================
       LÓGICA PARA ENVIAR POR CORREO
       ================================= */
    function openEmailModal() {
      document.getElementById('target-email').value = '';
      document.getElementById('email-modal').style.display = 'flex';
    }
    
    function closeEmailModal() { 
      document.getElementById('email-modal').style.display = 'none'; 
    }

    function sendEmail() {
      if (!navigator.onLine) {
        showCustomAlert("No tienes conexión a internet. Esta acción requiere estar en línea.");
        return;
      }

      const email = document.getElementById('target-email').value.trim();
      const imgUrl = document.getElementById('lightbox-img').src;
      
      if (!email || !email.includes('@')) {
        showCustomAlert("Por favor ingresa un correo electrónico válido.");
        return;
      }
      
      setLoaderState('loading');
      document.getElementById('btn-send-email').disabled = true;
      
      let payload = { action: 'sendEmail', email: email, url: imgUrl };
      
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(res => {
            if(res.success) {
              setLoaderState('success', 'Documento enviado con éxito.');
              setTimeout(closeEmailModal, 2000);
            } else {
              setLoaderState('error', res.error);
            }
            document.getElementById('btn-send-email').disabled = false;
          })
          .withFailureHandler(err => {
            setLoaderState('error', err.message);
            document.getElementById('btn-send-email').disabled = false;
          })
          .enviarDocumentoPorCorreo(payload);
      } else {
        fetch(webAppUrl, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } })
        .then(res => res.json())
        .then(res => {
          if (res.success) {
            setLoaderState('success', 'Documento enviado con éxito.');
            setTimeout(closeEmailModal, 2000);
          } else {
            setLoaderState('error', res.error);
          }
          document.getElementById('btn-send-email').disabled = false;
        })
        .catch(err => {
          setLoaderState('error', err.message);
          document.getElementById('btn-send-email').disabled = false;
        });
      }
    }

    // MANEJO DEL LOADER DINÁMICO
    function setLoaderState(state, msg) {
      const container = document.getElementById('loader-card-content');
      
      if (state === 'loading') {
        container.innerHTML = `
          <svg class="status-icon loader-icon-blue spinner-anim" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          <p class="loader-title">Procesando</p>
          <p class="loader-subtitle">Por favor espere...</p>
        `;
        document.getElementById('custom-loader-modal').style.display = 'flex';
        
      } else if (state === 'success') {
        container.innerHTML = `
          <svg class="status-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="12" fill="#7ac142"/>
            <path d="M10.2 16.2l-3.6-3.6 1.4-1.4 2.2 2.2 5.8-5.8 1.4 1.4-7.2 7.2z" fill="#fff"/>
          </svg>
          <p class="loader-title" style="color: #7ac142;">¡Éxito!</p>
          <p class="loader-subtitle">${msg || 'Archivos subidos exitosamente.'}</p>
        `;
        setTimeout(() => {
          document.getElementById('custom-loader-modal').style.display = 'none';
          if(!msg || msg.includes('subidos')) {
            closeUploadModal();
            fetchData(true);
          }
        }, 2000);
        
      } else if (state === 'error') {
        container.innerHTML = `
          <svg class="status-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="12" fill="#e74c3c"/>
            <path d="M15.4 7.2l1.4 1.4-3.4 3.4 3.4 3.4-1.4 1.4-3.4-3.4-3.4 3.4-1.4-1.4 3.4-3.4-3.4-3.4 1.4-1.4 3.4 3.4 3.4-3.4z" fill="#fff"/>
          </svg>
          <p class="loader-title" style="color: #e74c3c;">Error</p>
          <p class="loader-subtitle">${msg}</p>
          <button class="btn-alert" onclick="document.getElementById('custom-loader-modal').style.display='none'">Cerrar</button>
        `;
      }
    }

    async function handleUpload() {
      if (!navigator.onLine) {
        showCustomAlert("No tienes conexión a internet. No puedes subir documentos en este momento.");
        return;
      }

      const isNew = document.getElementById('is-new-item').checked;
      let titulo = ''; let idItem = ''; let logoData = null;
      const fileInput = document.getElementById('upload-file');
      const fechaCreacion = document.getElementById('fecha-creacion').value;
      const fechaVencimiento = document.getElementById('fecha-vencimiento').value;

      if (isNew) {
        idItem = document.getElementById('new-id').value.trim();
        titulo = document.getElementById('new-title').value.trim();
        const logoInput = document.getElementById('new-logo');
        
        if (!idItem || !titulo) { showCustomAlert("Por favor, ingresa el ID y el Título de la nueva institución."); return; }
        if (logoInput.files.length === 0) { showCustomAlert("Por favor, selecciona un logo para la nueva institución."); return; }
        
        let logoFile = logoInput.files[0];
        let base64Logo = await toBase64(logoFile);
        logoData = { name: logoFile.name, mimeType: logoFile.type, base64: base64Logo.split(',')[1] };
      } else {
        titulo = document.getElementById('upload-select').value;
        if (!titulo) { showCustomAlert("Por favor, selecciona una institución."); return; }
        if (fileInput.files.length === 0) { showCustomAlert("Por favor, selecciona al menos un archivo."); return; }
      }

      if (fileInput.files.length > 0 && (!fechaCreacion || !fechaVencimiento)) {
         showCustomAlert("Por favor, ingresa la fecha de creación y de vencimiento del documento.");
         return;
      }

      // 1. Mostrar estado Loading
      setLoaderState('loading');
      document.getElementById('btn-upload').disabled = true;

      let filesData = [];
      if (fileInput.files.length > 0) {
        for (let i = 0; i < fileInput.files.length; i++) {
          let file = fileInput.files[i];
          let base64Full = await toBase64(file);
          filesData.push({ name: file.name, mimeType: file.type, base64: base64Full.split(',')[1] });
        }
      }

      let payload = { 
        titulo: titulo, 
        files: filesData, 
        isNew: isNew, 
        id: idItem, 
        logo: logoData, 
        fechaCreacion: fechaCreacion, 
        fechaVencimiento: fechaVencimiento 
      };

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(res => { 
            setLoaderState('success'); 
            document.getElementById('btn-upload').disabled = false; 
          })
          .withFailureHandler(err => { 
            setLoaderState('error', err.message); 
            document.getElementById('btn-upload').disabled = false; 
          })
          .procesarSubida(payload);
      } else {
        fetch(webAppUrl, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } })
        .then(res => res.json())
        .then(res => {
          if (res.success) setLoaderState('success');
          else setLoaderState('error', res.error);
          document.getElementById('btn-upload').disabled = false;
        })
        .catch(err => {
          setLoaderState('error', err.message);
          document.getElementById('btn-upload').disabled = false;
        });
      }
    }

    window.onclick = function(event) {
      const modal = document.getElementById('modal');
      const uploadModal = document.getElementById('upload-modal');
      const emailModal = document.getElementById('email-modal');
      const lightbox = document.getElementById('lightbox');
      const customAlert = document.getElementById('custom-alert-modal');

      if (event.target === modal && lightbox.style.display !== 'flex') closeModal();
      if (event.target === uploadModal) closeUploadModal();
      if (event.target === emailModal) closeEmailModal();
      if (event.target === customAlert) closeCustomAlert();
    }

    / ==============================================================
    // REGISTRO DEL SERVICE WORKER PARA CACHÉ DE IMÁGENES OFFLINE
    // ==============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrado correctamente'))
          .catch(err => console.error('Error al registrar Service Worker:', err));
      });
    }
  </script>
</body>
