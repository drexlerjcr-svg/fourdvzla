<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SUNDDE - Sistema de Monitoreo Premium</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="shortcut icon" href="https://i.ibb.co/zTQvCJWh/denuncias-1.png" type="image/png">
  <link rel="apple-touch-icon" href="https://i.ibb.co/zTQvCJWh/denuncias-1.png">
  
  <style>
    /* VARIABLES Y DISEÑO LIQUID GLASS OPTIMIZADO PARA TEXTO NEGRO */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.82); 
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
      --text-main: #000000; 
      --primary: #007bff;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://i.ibb.co/Q3wxsDRV/fondoprincipal.png') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: var(--glass-shadow);
    }

    /* PANTALLA LOGIN */
    #login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
      box-sizing: border-box;
    }

    .login-box h2 {
      color: #000000;
    }

    .login-box img {
      max-width: 180px;
      margin-bottom: 20px;
    }

    /* INPUTS EN TONOS CLAROS CON TEXTO NEGRO */
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.95);
      color: #000000; 
      font-weight: 600;
      outline: none;
      box-sizing: border-box;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(0, 0, 0, 0.55);
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    button:hover { background: #0056b3; transform: scale(1.02); }
    button:disabled { background: #a0c4ff; cursor: not-allowed; }

    /* DASHBOARD PRINCIPAL */
    #dashboard-screen {
      display: none;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      margin-bottom: 30px;
    }

    /* CORRECCIÓN: EVITAR QUE EL LOGO SEA GIGANTE EN EL PANEL */
    header img {
      max-width: 200px; 
      height: auto;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .card {
      padding: 24px;
      transition: transform 0.3s, box-shadow 0.3s;
      color: #000000; 
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px 0 rgba(0,0,0,0.3); }

    .card p, .card h3, .card label {
      color: #000000 !important; 
    }

    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      background: #007bff;
      color: white !important;
      float: right;
    }

    /* ESTADISTICAS */
    .stats-container { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
    .stat-box { flex: 1; min-width: 150px; padding: 20px; text-align: center; }
    .stat-box h2 { margin: 0; font-size: 2.6rem; color: #0056b3; }
    .stat-box p { color: #000000; font-weight: bold; }

    /* ANIMACION CARGA */
    #loader { display: none; text-align: center; padding: 30px; font-size: 1.3rem; color: #000000; }

    /* =========================================
       MEDIA QUERIES PARA CELULARES (RESPONSIVE)
       ========================================= */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        text-align: center;
        padding: 15px;
        gap: 15px;
      }
      
      header img {
        margin-bottom: 10px;
      }

      #user-info {
        display: block;
        margin-bottom: 10px;
        margin-right: 0 !important;
      }

      .stats-container {
        flex-direction: column;
        gap: 10px;
      }

      .grid-container {
        grid-template-columns: 1fr;
      }

      #panel-title {
        font-size: 1.5rem;
        text-align: center;
        margin-bottom: 15px !important;
      }

      div[style*="justify-content: space-between"] {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box glass-panel">
      <img src="https://i.ibb.co/v4pPWh2s/sundde.png" alt="SUNDDE Logo">
      <h2>Módulo de Acceso</h2>
      <input type="email" id="email" placeholder="Correo Corporativo o Empresa" required>
      <input type="password" id="pass" placeholder="Contraseña Seguro" required>
      <button id="btn-login" onclick="iniciarSesion()">Ingresar al Sistema</button>
      <p id="login-error" style="color:#dc3545; display:none; margin-top:15px; font-weight:bold;"></p>
    </div>
  </div>

  <div id="dashboard-screen">
    <header class="glass-panel">
      <img src="https://i.ibb.co/v4pPWh2s/sundde.png" alt="SUNDDE">
      <div>
        <span id="user-info" style="margin-right: 20px; font-weight: bold; font-size:1.1rem; color:#000000;"></span>
        <button onclick="cerrarSesion()" style="width: auto; background: #dc3545;">Cerrar Sesión</button>
      </div>
    </header>

    <div id="dashboard-stats" class="stats-container" style="display:none;"></div>

    <div style="margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;">
      <h2 id="panel-title" style="margin:0; color:#000000;">Bandeja de Casos Asignados</h2>
      <button id="btn-descarga-lote" style="width: auto; display: none; background:#28a745;" onclick="descargarLote()"><i class="fas fa-download"></i> Descargar Todo el Lote</button>
    </div>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i><br><span style="margin-top:10px; display:inline-block; font-weight:bold; color:#000000;">Sincronizando con Google Sheets...</span></div>
    <div id="denuncias-container" class="grid-container"></div>
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxC859D4u4GWusT8FBrCZgQf_6QpX7995_UPv-zSnMx0T3WJkbRR0qLmDH8Wxp5EWDE/exec";
    
    let currentUser = null;
    let currentDenuncias = [];

    // Verificación automática de sesión al cargar la página
    window.addEventListener('DOMContentLoaded', () => {
      const sesionGuardada = localStorage.getItem('sundde_sesion');
      if (sesionGuardada) {
        currentUser = JSON.parse(sesionGuardada);
        levantarDashboard();
      }
    });

    async function requestAPI(action, payload = {}) {
      try {
        const response = await fetch(WEBAPP_URL, {
          method: "POST",
          mode: "cors",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify({ action, payload })
        });
        return await response.json();
      } catch (err) {
        console.error("Error en conexión de API:", err);
        return { success: false, message: "Error al enlazar con el servidor de Google." };
      }
    }

    async function iniciarSesion() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      const errBox = document.getElementById('login-error');
      const btnLogin = document.getElementById('btn-login');
      errBox.style.display = 'none';
      
      if(!email || !pass) {
        errBox.innerText = "Por favor, complete los campos.";
        errBox.style.display = 'block';
        return;
      }

      btnLogin.disabled = true;
      btnLogin.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Verificando credenciales...`;

      const res = await requestAPI("loginUser", { email, pass });
      
      if(!res.success) {
        btnLogin.disabled = false;
        btnLogin.innerHTML = "Ingresar al Sistema";
        errBox.innerText = res.message;
        errBox.style.display = 'block';
      } else {
        currentUser = res;
        localStorage.setItem('sundde_sesion', JSON.stringify(res)); 
        levantarDashboard();
      }
    }

    function levantarDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';
      document.getElementById('user-info').innerText = `${currentUser.nombre} (${currentUser.role})`;
      
      // Llamamos a la nueva función de estadísticas dinámicas
      loadStats(currentUser.role);
      
      if(currentUser.role === "Analista Denunciado" || currentUser.role === "Fiscal Nacional") {
        document.getElementById('btn-descarga-lote').style.display = 'block';
      }
      
      cargarDenuncias();
    }

    async function cargarDenuncias() {
      document.getElementById('loader').style.display = 'block';
      document.getElementById('denuncias-container').innerHTML = '';
      
      const data = await requestAPI("getDenuncias", { user: currentUser });
      currentDenuncias = data;
      document.getElementById('loader').style.display = 'none';
      renderCards(data);
    }

    function renderCards(data) {
      const container = document.getElementById('denuncias-container');
      if(data.length === 0) {
        container.innerHTML = `<p style="grid-column: 1/-1; text-align:center; font-weight:bold; opacity:0.7; color:#000000;">No tienes denuncias asignadas en esta etapa del proceso.</p>`;
        return;
      }

      data.forEach(d => {
        let card = document.createElement('div');
        card.className = 'card glass-panel';
        
        let html = `
          <h3>Caso: ${d.ID_Denuncia} <span class="badge">${d.Estatus}</span></h3>
          <p><strong>Empresa/Sujeto:</strong> ${d.Empresa} (${d.Sujeto_De_La_Denuncia || 'N/A'})</p>
          <p><strong>Denunciante:</strong> ${d.Denunciante} | Tel: ${d.Telefono}</p>
          <p><strong>Producto:</strong> ${d.Producto}</p>
          <p style="background: rgba(0,0,0,0.06); padding:10px; border-radius:6px; font-size:13px; border: 1px solid rgba(0,0,0,0.1); color:#000000;"><strong>Motivo:</strong> ${d.Motivo_De_La_Denuncia}</p>
        `;

        if(currentUser.role === "Analista SUNDDE") {
           html += `<label style="font-size:12px; font-weight:bold;">Adjuntar PDF Soporte Denunciante:</label>
                    <input type="file" id="file_${d.ID_Denuncia}" accept="application/pdf">
                    <button onclick="procesar('SUNDDE_NOTIFICAR', ${d.rowIndex}, '${d.ID_Denuncia}')"><i class="fas fa-paper-plane"></i> Notificar a Empresa</button>`;
        }
        
        if(currentUser.role === "Analista Denunciado") {
           if(d.PDF_SUNDDE) html += `<a href="${d.PDF_SUNDDE}" target="_blank" style="color: #0056b3; font-weight:bold; text-decoration:underline;"><i class="fas fa-file-pdf"></i> Descargar Documento Denuncia</a><br><br>`;
           html += `<textarea id="coment_${d.ID_Denuncia}" placeholder="Escribe el Acta de conformidad y comentarios de entrega obligatorios..." required></textarea>
                    <label style="font-size:12px; font-weight:bold;">Subir Foto/Acta Soporte (PDF):</label>
                    <input type="file" id="file_${d.ID_Denuncia}" accept="application/pdf">
                    <button onclick="procesar('EMPRESA_ATENDER', ${d.rowIndex}, '${d.ID_Denuncia}')"><i class="fas fa-check"></i> Cargar y Atender Denuncia</button>`;
        }

        if(currentUser.role === "Fiscal Nacional") {
           html += `<p><strong>Descargo de Empresa:</strong> ${d.Respuesta_Empresa}</p>
                    <a href="${d.PDF_Empresa}" target="_blank" style="color: #0056b3; font-weight:bold; text-decoration:underline;"><i class="fas fa-file-pdf"></i> Descargar Evidencias de Empresa</a><br><br>
                    <select id="sel_${d.ID_Denuncia}" onchange="toggleComentFiscal('${d.ID_Denuncia}')">
                      <option value="SI">Sí Conforme (Cierre y mandar encuesta)</option>
                      <option value="NO">No Conforme (Devolver a la Empresa)</option>
                    </select>
                    <div id="wrapper_fiscal_${d.ID_Denuncia}" style="display:none;">
                      <textarea id="coment_${d.ID_Denuncia}" placeholder="Escribe un breve mensaje del porqué no está conforme..."></textarea>
                    </div>
                    <div id="file_fiscal_wrap_${d.ID_Denuncia}">
                      <label style="font-size:12px; font-weight:bold;">Adjuntar Acta Cierre Fiscal (PDF):</label>
                      <input type="file" id="file_${d.ID_Denuncia}" accept="application/pdf">
                    </div>
                    <button onclick="procesarFiscal(${d.rowIndex}, '${d.ID_Denuncia}', '${d.Correo_Denunciante}')"><i class="fas fa-gavel"></i> Procesar Decisión</button>`;
        }

        if(currentUser.role === "Asistente de Seguimiento") {
            html += `<p><strong>Respuesta de Empresa:</strong> ${d.Respuesta_Empresa}</p>
                     <label style="font-size:12px; font-weight:bold;">Puntuación de Encuesta del Ciudadano (1 a 5 Estrellas):</label>
                     <input type="number" id="sat_${d.ID_Denuncia}" min="1" max="5" placeholder="Ej: 5">
                     <button onclick="procesar('SEGUIMIENTO_CERRAR', ${d.rowIndex}, '${d.ID_Denuncia}')"><i class="fas fa-box-archive"></i> Registrar Encuesta y Archivar</button>`;
        }

        if(currentUser.role === "Administrador General") {
           html += `<p><strong>Nivel de Satisfacción:</strong> ${d.Satisfaccion_Encuesta ? d.Satisfaccion_Encuesta + ' <i class="fas fa-star" style="color:#ffc107;"></i>' : 'Pendiente Cierre'}</p>`;
           if(d.Estatus === "Enviado a Empresa") {
             html += `<button style="background:#ff8c00;" onclick="procesar('ADMIN_ALERTA', ${d.rowIndex}, '${d.ID_Denuncia}')"><i class="fas fa-bell"></i> Alertar Empresa Demorada</button>`;
           }
        }

        card.innerHTML = html;
        container.appendChild(card);
      });
    }

    function toggleComentFiscal(id) {
      const val = document.getElementById(`sel_${id}`).value;
      document.getElementById(`wrapper_fiscal_${id}`).style.display = val === "NO" ? "block" : "none";
      document.getElementById('file_fiscal_wrap_' + id).style.display = val === "SI" ? "block" : "none";
    }

    async function procesar(subAction, rowIndex, id) {
      let fileInput = document.getElementById(`file_${id}`);
      let payload = { subAction, data: { rowIndex: rowIndex } };

      if(subAction === 'EMPRESA_ATENDER') {
        const txt = document.getElementById(`coment_${id}`).value;
        if(!txt) { alert("El comentario es obligatorio"); return; }
        payload.data.comentario = txt;
      }
      if(subAction === 'SEGUIMIENTO_CERRAR') {
        payload.data.satisfaccion = document.getElementById(`sat_${id}`).value;
      }

      if(fileInput && fileInput.files.length > 0) {
         let file = fileInput.files[0];
         let reader = new FileReader();
         reader.onload = async function(e) {
           payload.data.fileBase64 = e.target.result;
           payload.data.fileName = id + "_document.pdf";
           ejecutarBackend(payload);
         };
         reader.readAsDataURL(file);
      } else {
         if(subAction === 'EMPRESA_ATENDER' || subAction === 'SUNDDE_NOTIFICAR') {
           alert("Debe adjuntar el archivo PDF solicitado.");
           return;
         }
         ejecutarBackend(payload);
      }
    }

    async function procesarFiscal(rowIndex, id, correo) {
       let sel = document.getElementById(`sel_${id}`).value;
       let payload = { subAction: "", data: { rowIndex: rowIndex, correoDenunciante: correo } };
       
       if(sel === "NO") {
         payload.subAction = "FISCAL_NOCONFORME";
         payload.data.comentarioFiscal = document.getElementById(`coment_${id}`).value;
         ejecutarBackend(payload);
       } else {
         payload.subAction = "FISCAL_CONFORME";
         let fileInput = document.getElementById(`file_${id}`);
         if(!fileInput || fileInput.files.length === 0){
           alert("Debe adjuntar el Acta del Fiscal en PDF de cierre.");
           return;
         }
         let file = fileInput.files[0];
         let reader = new FileReader();
         reader.onload = async function(e) {
           payload.data.fileBase64 = e.target.result;
           payload.data.fileName = id + "_acta_fiscal.pdf";
           ejecutarBackend(payload);
         };
         reader.readAsDataURL(file);
       }
    }

    async function ejecutarBackend(payload) {
      document.getElementById('loader').style.display = 'block';
      const res = await requestAPI("procesarDenuncia", payload);
      alert(res.message);
      cargarDenuncias();
    }

    function descargarLote() {
       currentDenuncias.forEach((d, index) => {
         let url = d.PDF_SUNDDE || d.PDF_Empresa;
         if(url) {
           setTimeout(() => { window.open(url, '_blank'); }, index * 1000);
         }
       });
    }

    // NUEVA FUNCIÓN PARA FILTRAR ESTADÍSTICAS POR ROL
    async function loadStats(role) {
      document.getElementById('dashboard-stats').style.display = 'flex';
      const stats = await requestAPI("getStats");
      
      // Todos los roles ven estas dos
      let html = `
        <div class="stat-box glass-panel"><h2>${stats.recibidas}</h2><p>Recibidas</p></div>
        <div class="stat-box glass-panel"><h2>${stats.atendidas}</h2><p>Atendidas</p></div>
      `;

      // Los Analistas no ven "Cerradas". El resto de los roles sí.
      if (role !== "Analista SUNDDE" && role !== "Analista Denunciado") {
        html += `<div class="stat-box glass-panel"><h2>${stats.cerradas}</h2><p>Cerradas</p></div>`;
      }

      // Solo los Administradores y Seguimiento ven la "Satisfacción"
      if (role === "Administrador General" || role === "Asistente de Seguimiento") {
        let starsHtml = "";
        let roundedStars = Math.round(stats.promedioSatisfaccion);
        for(let i=1; i<=5; i++) {
          starsHtml += `<i class="fa${i <= roundedStars ? 's' : 'r'} fa-star" style="color:#ffc107;"></i>`;
        }
        html += `<div class="stat-box glass-panel"><h2>${stats.promedioSatisfaccion}</h2><p>${starsHtml}</p></div>`;
      }

      document.getElementById('dashboard-stats').innerHTML = html;
    }

    function cerrarSesion() {
      currentUser = null;
      localStorage.removeItem('sundde_sesion'); 
      document.getElementById('dashboard-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('email').value = '';
      document.getElementById('pass').value = '';
      
      const btnLogin = document.getElementById('btn-login');
      btnLogin.disabled = false;
      btnLogin.innerHTML = "Ingresar al Sistema";
    }
  </script>
</body>
</html>
