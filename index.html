<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store - Liquid Glass Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-

awesome/6.0.0/css/all.min.css">
    <!-- EmailJS SDK -->
    <script type="text/javascript" 

src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?

family=Montserrat:wght@300;400;700;900&display=swap');
        :root { --glass-bg: rgba(255, 255, 255, 0.06); --glass-border: rgba(255, 255, 255, 0.1); --

orange: #f37021; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, 

#1a1410 50%, #f37021 100%); background-attachment: fixed; color: white; min-height: 100vh; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--

glass-border); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px 

solid rgba(255, 255, 255, 0.08); transition: 0.3s; }
        .glass-card:hover { border-color: var(--orange); transform: translateY(-3px); }
        .sidebar-transition { transition: transform 0.5s cubic-bezier(0.77, 0.2, 0.05, 1); }
        .admin-tab.active { border-bottom: 3px solid var(--orange); background: rgba

(255,255,255,0.05); }
        .sub-tab.active { background: var(--orange); color: white; }
        .hidden { display: none !important; }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid 

rgba(255, 255, 255, 0.1) !important; color: white !important; outline: none; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="glass sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-xl">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="showSection('home')">
            <img id="site-logo" src="https://via.placeholder.com/100?text=LOGO" class="w-10 h-10 

rounded-full border border-white/20">
            <h1 class="font-black text-lg uppercase italic tracking-tighter">Digital<span 

class="text-[#f37021]">Store</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="openCart()" class="relative glass-card p-2 rounded-full hover:bg-

[#f37021] transition">
                <i class="fas fa-shopping-basket text-lg"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-[#f37021] text-white text-

[8px] font-bold px-1.5 py-0.5 rounded-full border border-white/20">0</span>
            </button>
            <button onclick="checkAdminAuth()" class="opacity-30 hover:opacity-100 transition text-

xl"><i class="fas fa-cog"></i></button>
        </div>
    </nav>

    <!-- CATÁLOGO -->
    <section id="section-home" class="section max-w-[1600px] mx-auto px-4 py-10">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-black italic uppercase tracking-tighter">Catálogo <span 

class="text-[#f37021]">Digital</span></h2>
            <p class="text-white/30 uppercase text-[8px] tracking-[0.5em] mt-2 italic">Descarga tus 

archivos al instante tras el pago</p>
        </div>
        <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 

xl:grid-cols-6 gap-4"></div>
    </section>

    <!-- LOGIN ADMIN -->
    <section id="section-login" class="section hidden min-h-[70vh] flex items-center justify-center 

p-6 text-center">
        <div class="glass p-10 rounded-[40px] w-full max-w-md">
            <h2 class="text-2xl font-black mb-8 uppercase italic tracking-widest text-

[#f37021]">Admin Access</h2>
            <form id="login-form" class="space-y-4">
                <input type="email" id="admin-email" placeholder="Correo" class="w-full p-4 rounded-

2xl" required>
                <input type="password" id="admin-pass" placeholder="Contraseña" class="w-full p-4 

rounded-2xl" required>
                <button type="submit" class="w-full bg-[#f37021] text-white font-black py-4 rounded-

2xl uppercase italic">Entrar al Panel</button>
            </form>
        </div>
    </section>

    <!-- PANEL ADMIN -->
    <section id="section-admin-panel" class="section hidden p-4">
        <div class="max-w-7xl mx-auto glass rounded-[40px] overflow-hidden min-h-[600px]">
            <div class="p-6 flex justify-between items-center border-b border-white/10 bg-black/20">
                <h2 class="text-lg font-black italic uppercase italic">Administración de Ventas</h2>
                <button onclick="logout()" class="bg-red-500/20 hover:bg-red-500 text-white px-5 py-2 

rounded-full text-[9px] font-bold transition">SALIR</button>
            </div>
            
            <div class="flex font-bold text-white/40 uppercase text-[9px] tracking-widest bg-

black/10">
                <button onclick="switchTab('tab-products')" class="admin-tab active flex-1 py-

4">Inventario</button>
                <button onclick="switchTab('tab-orders')" class="admin-tab flex-1 py-4">Ventas 

Recibidas</button>
                <button onclick="switchTab('tab-config')" class="admin-tab flex-1 py-4">Logo</button>
            </div>

            <div class="p-6">
                <!-- FORM PRODUCTOS -->
                <div id="tab-products" class="tab-content">
                    <form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8 bg-

white/5 p-6 rounded-3xl border border-white/10">
                        <h3 id="form-title" class="col-span-full text-[10px] font-black text-

[#f37021] uppercase italic tracking-widest mb-2">Añadir / Editar Producto</h3>
                        <input type="text" id="p-name" placeholder="Nombre del Producto" class="p-3 

rounded-xl" required>
                        <input type="number" id="p-price" placeholder="Precio ($)" class="p-3 

rounded-xl" required>
                        <textarea id="p-desc" placeholder="Descripción completa..." class="p-3 

rounded-xl col-span-full h-20 resize-none" required></textarea>
                        <input type="text" id="p-img" placeholder="URL de la Imagen de Portada" 

class="p-3 rounded-xl col-span-full" required>
                        <input type="text" id="p-link" placeholder="URL de descarga (Google Drive / 

MEGA / Dropbox)" class="p-3 rounded-xl col-span-full border-[#f37021]/30" required>
                        
                        <div class="col-span-full flex gap-2">
                            <button id="btn-submit-product" type="submit" class="flex-grow bg-

[#f37021] text-white font-black rounded-xl py-3 uppercase text-[10px]">Guardar Producto</button>
                            <button id="btn-cancel-edit" type="button" onclick="cancelProductEdit()" 

class="hidden bg-gray-600 text-white px-6 rounded-xl text-[9px] font-bold">CANCELAR</button>
                        </div>
                    </form>
                    <div id="admin-products-list" class="grid gap-2"></div>
                </div>

                <!-- GESTIÓN VENTAS -->
                <div id="tab-orders" class="tab-content hidden space-y-6">
                    <div class="flex justify-center gap-2 mb-6">
                        <button onclick="filterSales('revision')" id="btn-f-revision" class="sub-tab 

active px-4 py-2 rounded-full text-[9px] font-bold uppercase glass-card">Nuevos</button>
                        <button onclick="filterSales('confirmado')" id="btn-f-confirmado" 

class="sub-tab px-4 py-2 rounded-full text-[9px] font-bold uppercase glass-card">Confirmados</button>
                        <button onclick="filterSales('rechazado')" id="btn-f-rechazado" class="sub-

tab px-4 py-2 rounded-full text-[9px] font-bold uppercase glass-card">Rechazados</button>
                    </div>
                    <div id="sales-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 

gap-4"></div>
                </div>

                <div id="tab-config" class="tab-content hidden text-center space-y-4">
                    <input type="text" id="new-logo-url" placeholder="URL Logo" class="p-4 rounded-xl 

w-full max-w-md">
                    <button onclick="updateLogo()" class="bg-[#f37021] text-white px-8 py-3 rounded-

xl font-black text-xs uppercase">Actualizar Logo</button>
                </div>
            </div>
        </div>
    </section>

    <!-- CARRITO SIDEBAR -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[450px] glass z-[60] transform 

translate-x-full sidebar-transition flex flex-col border-l border-white/10">
        <div class="p-6 bg-black/40 flex justify-between items-center">
            <h2 class="text-xl font-black italic uppercase italic tracking-tighter">Mi Compra</h2>
            <button onclick="closeCart()" class="text-5xl hover:text-[#f37021] transition leading-

none">&times;</button>
        </div>
        <div class="flex-grow overflow-y-auto p-6 space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="font-bold uppercase text-[9px] opacity-20 tracking-widest 

italic">Resumen</h3>
                <button onclick="clearCart()" class="text-[9px] text-red-400 font-bold uppercase 

underline">Vaciar</button>
            </div>
            <div id="cart-items" class="space-y-3"></div>
            
            <div class="glass-card p-5 rounded-[25px] border-[#f37021]/50 border text-center shadow-

lg">
                <p class="text-[#f37021] font-black uppercase text-[10px] mb-2 tracking-widest italic 

italic">Pago Móvil Banesco</p>
                <div class="text-[12px] opacity-90 font-bold italic">
                    <p>Banco: Banesco</p>
                    <p>Cédula: 24981262</p>
                    <p>Teléfono: 04143309639</p>
                </div>
            </div>

            <div class="space-y-3 border-t border-white/10 pt-6">
                <input type="text" id="cust-name" placeholder="Tu Nombre" class="p-4 rounded-xl w-

full text-sm">
                <input type="text" id="cust-cedula" placeholder="Cédula" class="p-4 rounded-xl w-full 

text-sm">
                <input type="email" id="cust-email" placeholder="Email (Aquí recibirás tus archivos)" 

class="p-4 rounded-xl w-full text-sm">
                <input type="tel" id="cust-wha" placeholder="WhatsApp" class="p-4 rounded-xl w-full 

text-sm">
                <input type="text" id="cust-ref" placeholder="N° Referencia del Pago" class="p-4 

rounded-xl w-full text-sm font-bold text-[#f37021]">
                <div class="glass-card p-6 rounded-2xl border-dashed border-2 border-white/10 text-

center">
                    <label class="text-[9px] font-black text-white/40 uppercase block mb-2">Captura 

de Pago</label>
                    <input type="file" id="cust-file" accept="image/*" class="text-[10px] text-

white/50 mx-auto">
                </div>
            </div>
        </div>
        <div class="p-6 bg-black/40 space-y-4">
            <div class="flex justify-between items-center"><span class="font-bold opacity-30 

uppercase text-[10px]">Total:</span><span id="cart-total" class="text-3xl font-black text-

[#f37021]">$0.00</span></div>
            <button id="btn-confirm" onclick="processPayment()" class="w-full bg-[#f37021] text-white 

font-black py-4 rounded-2xl uppercase italic text-lg shadow-xl">Confirmar Pedido</button>
        </div>
    </div>

    <!-- OVERLAYS -->
    <div id="image-overlay" class="fixed inset-0 bg-black/98 z-[100] hidden flex items-center 

justify-center p-4" onclick="closeImageOverlay()"><img id="overlay-img" src="" class="max-w-full 

max-h-full rounded-lg shadow-2xl"></div>
    <div id="cart-overlay" class="fixed inset-0 bg-black/70 z-[55] hidden backdrop-blur-md" 

onclick="closeCart()"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc, updateDoc, 

getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-

firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 

"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { apiKey : "AIzaSyClcdmMyvSfkJZicrRXZEmWT8CWHy5ApcI" , authDomain : 

"digitalstore-b109b.firebaseapp.com" , projectId : "digitalstore-b109b" , storageBucket : 

"digitalstore-b109b.firebasestorage.app" , messagingSenderId : "654989683570" , appId : 

"1:654989683570:web:fe9dafa4716855a63d0beb" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // CONFIGURACIÓN EMAILJS
        emailjs.init("TU_USER_ID_AQUI"); // Sustituir por tu Public Key de EmailJS

        let cart = [];
        let allOrders = [];
        let currentStatusFilter = 'revision';
        let editingProductId = null;
        let salesListener = null;

        // NAVEGACIÓN
        window.showSection = (id) => { document.querySelectorAll('.section').forEach(s => 

s.classList.add('hidden')); document.getElementById(`section-${id}`).classList.remove('hidden'); };
        window.openCart = () => { document.getElementById('cart-sidebar').classList.remove

('translate-x-full'); document.getElementById('cart-overlay').classList.remove('hidden'); };
        window.closeCart = () => { document.getElementById('cart-sidebar').classList.add('translate-

x-full'); document.getElementById('cart-overlay').classList.add('hidden'); };
        window.switchTab = (id) => { document.querySelectorAll('.tab-content').forEach(t => 

t.classList.add('hidden')); document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove

('active')); document.getElementById(id).classList.remove('hidden'); if(event) 

event.currentTarget.classList.add('active'); };

        // AUTH
        window.checkAdminAuth = () => auth.currentUser ? showSection('admin-panel') : showSection

('login');
        onAuthStateChanged(auth, (user) => { if (user) initSalesListener(); });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try { await signInWithEmailAndPassword(auth, document.getElementById('admin-

email').value, document.getElementById('admin-pass').value); showSection('admin-panel'); } catch 

(err) { alert("Error"); }
        };

        function initSalesListener() {
            if (salesListener) salesListener();
            salesListener = onSnapshot(collection(db, "pedidos"), (snap) => {
                allOrders = []; snap.forEach(d => allOrders.push({ id: d.id, ...d.data() })); 

renderFilteredSales();
            });
        }
        window.logout = () => signOut(auth).then(() => location.reload());

        // PRODUCTOS
        onSnapshot(collection(db, "productos"), (snap) => {
            const grid = document.getElementById('products-grid');
            const adminList = document.getElementById('admin-products-list');
            grid.innerHTML = ''; adminList.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                const cleanName = p.nombre.replace(/'/g, "\\'");
                grid.innerHTML += `<div class="glass-card rounded-[30px] overflow-hidden p-3 flex 

flex-col h-full"><img src="${p.imagen}" class="w-full h-32 object-cover rounded-[20px] mb-3"><div 

class="px-1 flex-grow"><h3 class="font-black text-[9px] uppercase italic text-[#f37021] leading-tight 

mb-1">${p.nombre}</h3><p class="text-[8px] opacity-40 font-medium whitespace-pre-line leading-

relaxed">${p.descripcion}</p></div><div class="mt-auto flex justify-between items-center bg-white/5 

p-2 rounded-2xl"><span class="text-lg font-black text-white ml-1">$${p.precio}</span><button 

onclick="addToCart('${cleanName}', ${p.precio})" class="bg-[#f37021] text-white px-3 py-1.5 rounded-

full font-bold text-[8px] uppercase hover:scale-105 transition italic 

italic">Comprar</button></div></div>`;
                adminList.innerHTML += `<div class="glass-card flex justify-between p-3 rounded-xl 

items-center text-[9px] uppercase font-bold tracking-widest border border-white/5"><div class="flex 

items-center gap-3"><img src="${p.imagen}" class="w-8 h-8 rounded-lg object-cover"><span>${p.nombre}

</span></div><div class="flex gap-2"><button onclick="prepareProductEdit('${d.id}')" class="text-

orange p-2"><i class="fas fa-edit"></i></button><button onclick="deleteProduct('${d.id}')" 

class="text-red-400 p-2"><i class="fas fa-trash-alt"></i></button></div></div>`;
            });
        });

        window.prepareProductEdit = async (id) => {
            const docSnap = await getDoc(doc(db, "productos", id));
            if (docSnap.exists()) {
                const data = docSnap.data(); editingProductId = id;
                document.getElementById('p-name').value = data.nombre; document.getElementById('p-

price').value = data.precio; document.getElementById('p-desc').value = data.descripcion; 

document.getElementById('p-img').value = data.imagen; document.getElementById('p-link').value = 

data.linkDescarga || '';
                document.getElementById('form-title').innerText = "Editando: " + data.nombre; 

document.getElementById('btn-submit-product').innerText = "Actualizar Producto"; 

document.getElementById('btn-cancel-edit').classList.remove('hidden');
                document.getElementById('product-form').scrollIntoView({ behavior: 'smooth' });
            }
        };

        window.cancelProductEdit = () => { editingProductId = null; document.getElementById

('product-form').reset(); document.getElementById('form-title').innerText = "Añadir Nuevo Producto"; 

document.getElementById('btn-submit-product').innerText = "Publicar"; document.getElementById('btn-

cancel-edit').classList.add('hidden'); };

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = { nombre: document.getElementById('p-name').value, precio: parseFloat

(document.getElementById('p-price').value), descripcion: document.getElementById('p-desc').value, 

imagen: document.getElementById('p-img').value, linkDescarga: document.getElementById('p-link').value 

};
            try {
                if (editingProductId) await updateDoc(doc(db, "productos", editingProductId), data);
                else await addDoc(collection(db, "productos"), data);
                cancelProductEdit();
            } catch (err) { alert("Error"); }
        };

        window.deleteProduct = (id) => confirm("¿Eliminar?") && deleteDoc(doc(db, "productos", id));
        window.addToCart = (n, p) => { cart.push({nombre: n, precio: p}); updateCartUI(); openCart(); 

};
        window.removeFromCart = (i) => { cart.splice(i, 1); updateCartUI(); };
        window.clearCart = () => { cart = []; updateCartUI(); };

        function updateCartUI() {
            const container = document.getElementById('cart-items'); const total = cart.reduce((s,i) 

=> s + i.precio, 0);
            container.innerHTML = cart.length === 0 ? '<p class="text-center opacity-20 py-10 italic 

text-[10px]">Vacío</p>' : cart.map((item, i) => `<div class="glass-card flex justify-between p-3 

rounded-xl items-center border-l-2 border-[#f37021]"><div><p class="font-bold text-[9px] uppercase 

italic">${item.nombre}</p><p class="text-[#f37021] font-black text-sm">$${item.precio}

</p></div><button onclick="removeFromCart(${i})" class="text-red-400 p-2"><i class="fas fa-times 

text-xs"></i></button></div>`).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`; 

document.getElementById('cart-count').innerText = cart.length;
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const MAX_WIDTH = 800; const 

scaleSize = MAX_WIDTH / img.width; canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, 

canvas.height); resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        window.processPayment = async () => {
            const file = document.getElementById('cust-file').files[0]; const name = 

document.getElementById('cust-name').value; const email = document.getElementById('cust-

email').value; const wha = document.getElementById('cust-wha').value; const ref = 

document.getElementById('cust-ref').value;
            if(cart.length === 0 || !name || !email || !wha || !ref || !file) return alert("Completa 

todos los datos y el comprobante.");
            const btn = document.getElementById('btn-confirm'); btn.disabled = true; btn.innerText = 

"ENVIANDO REPORTE...";
            try {
                const imgBase = await compressImage(file);
                await addDoc(collection(db, "pedidos"), { cliente: name, cedula: 

document.getElementById('cust-cedula').value, email, whatsapp: wha, referencia: ref, fotoComprobante: 

imgBase, items: cart, total: cart.reduce((s,i) => s + i.precio, 0), fecha: new Date().toLocaleString

(), estatus: "revision" });
                alert("¡Pedido enviado! En revisión."); cart = []; updateCartUI(); closeCart();
                document.getElementById('cust-name').value = ""; document.getElementById('cust-

cedula').value = ""; document.getElementById('cust-email').value = ""; document.getElementById

('cust-wha').value = ""; document.getElementById('cust-ref').value = ""; document.getElementById

('cust-file').value = "";
            } catch (e) { alert("Error"); } finally { btn.disabled = false; btn.innerText = "Realizar 

Pedido"; }
        };

        window.filterSales = (status) => {
            currentStatusFilter = status;
            document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-f-${status}`).classList.add('active');
            renderFilteredSales();
        };

        function renderFilteredSales() {
            const container = document.getElementById('sales-container');
            const filtered = allOrders.filter(o => o.estatus === currentStatusFilter);
            container.innerHTML = filtered.length === 0 ? '<p class="col-span-full text-center 

opacity-20 py-20 italic text-xs uppercase">Sin registros</p>' : 
            filtered.map(o => `
                <div class="glass-card p-5 rounded-[30px] flex flex-col gap-3 border-l-4 ${o.estatus 

=== 'confirmado' ? 'border-green-500' : o.estatus === 'rechazado' ? 'border-red-500' : 'border-

[#f37021]'}">
                    <div class="flex justify-between mb-2"><span class="text-[10px] font-black text-

[#f37021] uppercase italic">ID: ${o.id.slice(0,5)}</span><p class="text-[8px] opacity-30">${o.fecha}

</p></div>
                    <div class="text-[12px] font-bold space-y-1">
                        <p>Cliente: <span class="font-normal opacity-70 uppercase">${o.cliente}

</span></p>
                        <p>Tel: <span class="text-green-400 font-black">${o.whatsapp}</span></p>
                        <p>Ref: <span class="text-[#f37021] font-black">${o.referencia}</span></p>
                        <p>Email: <span class="font-normal text-blue-400 underline">${o.email}

</span></p>
                    </div>
                    <img src="${o.fotoComprobante}" onclick="openImageOverlay(this.src)" class="w-

full h-24 object-cover rounded-xl mt-2 cursor-zoom-in">
                    <div class="grid grid-cols-1 gap-2 mt-4 italic">
                        ${o.estatus === 'revision' ? `<button onclick="confirmAndSend('${o.id}')" 

class="bg-green-500/20 text-green-400 text-[10px] font-black py-3 rounded-lg border border-green-

500/20 uppercase italic">Confirmar Pago y Enviar Correo</button>` : ''}
                        <button onclick="updateOrderStatus('${o.id}', 'rechazado')" class="bg-red-

500/20 text-red-400 text-[9px] font-black py-2 rounded-lg border border-red-500/10 uppercase 

italic">Rechazar Pago</button>
                        <button onclick="deleteOrder('${o.id}')" class="bg-white/5 text-white text-

[8px] py-2 rounded-lg uppercase border border-white/5">Borrar</button>
                    </div>
                    <p class="text-xl font-black text-right tracking-tighter italic">$${o.total}</p>
                </div>`).join('');
        }

        // FUNCIÓN CLAVE: CONFIRMAR Y ENVIAR BOTONES DE DESCARGA
        window.confirmAndSend = async (id) => {
            const orderRef = doc(db, "pedidos", id);
            const orderSnap = await getDoc(orderRef);
            if (!orderSnap.exists()) return;
            const order = orderSnap.data();

            if(confirm("¿Confirmar pago y enviar archivos al cliente por correo?")) {
                const btn = event.currentTarget;
                btn.innerText = "ENVIANDO ARCHIVOS...";
                btn.disabled = true;

                try {
                    let productsHTML = "<ul>";
                    for (let item of order.items) {
                        const q = query(collection(db, "productos"), where("nombre", "==", 

item.nombre));
                        const prodSnap = await getDocs(q);
                        prodSnap.forEach(pDoc => {
                            const p = pDoc.data();
                            // Diseño de botón para el email
                            productsHTML += `<li style="margin-bottom: 20px;">
                                <strong>${p.nombre}</strong><br>
                                <a href="${p.linkDescarga}" style="display: inline-block; padding: 

10px 20px; background-color: #f37021; color: white; text-decoration: none; border-radius: 5px; font-

weight: bold; margin-top: 5px;">DESCARGAR ARCHIVO</a>
                            </li>`;
                        });
                    }
                    productsHTML += "</ul>";

                    const emailParams = {
                        to_name: order.cliente,
                        to_email: order.email,
                        download_links: productsHTML // Variable que debes poner en tu plantilla de 

EmailJS
                    };

                    await emailjs.send("TU_SERVICE_ID", "TU_TEMPLATE_ID", emailParams);
                    await updateDoc(orderRef, { estatus: "confirmado" });
                    alert("¡Pago confirmado y correo enviado!");
                } catch (e) { alert("Error al enviar email"); }
                finally { btn.innerText = "Confirmar y Enviar"; btn.disabled = false; }
            }
        };

        window.updateOrderStatus = async (id, s) => { await updateDoc(doc(db, "pedidos", id), { 

estatus: s }); };
        window.deleteOrder = (id) => confirm("¿Eliminar?") && deleteDoc(doc(db, "pedidos", id));
        window.openImageOverlay = (s) => { document.getElementById('overlay-img').src = s; 

document.getElementById('image-overlay').classList.remove('hidden'); };
        window.closeImageOverlay = () => document.getElementById('image-overlay').classList.add

('hidden');
        window.updateLogo = async () => { const url = document.getElementById('new-logo-url').value; 

await setDoc(doc(db, "settings", "site"), { logoUrl: url }); alert("Logo actualizado"); };
        onSnapshot(doc(db, "settings", "site"), d => { if(d.exists()) document.getElementById('site-

logo').src = d.data().logoUrl; });

    </script>
</body>
</html>
